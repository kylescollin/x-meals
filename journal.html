<style>
  :root{--cream:#faf7f2;--ink:#1a1a1a;--muted:#7a7264;--accent:#c8622a;--accent-light:#f5e8de;--border:#e4ded5;--check:#2d7a4f;--check-light:#e8f4ed;--ck-bg:#131311;--ck-dim:#252520;--ck-border:#2e2d28;--ck-text:#f0ebe0;--ck-muted:#6a6860;--ck-accent:#d4732e;--ck-done:#2d7a4f;}
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'DM Sans',sans-serif;background:var(--cream);color:var(--ink);min-height:100vh;-webkit-font-smoothing:antialiased;}
  .header{max-width:680px;margin:0 auto 36px;border-bottom:1px solid var(--border);padding:28px 20px 24px;}
  .header-eyebrow{font-weight:500;font-size:11px;letter-spacing:2.5px;text-transform:uppercase;color:var(--accent);margin-bottom:10px;}
  h1{font-family:'Playfair Display',serif;font-size:36px;font-weight:700;line-height:1.1;margin-bottom:8px;}
  .header-meta{font-size:13px;color:var(--muted);font-weight:300;}
  .journal{max-width:680px;margin:0 auto;padding:0 20px 60px;display:flex;flex-direction:column;gap:40px;}
  .week-entry{display:flex;flex-direction:column;gap:12px;}
  .week-header{display:flex;align-items:baseline;gap:12px;padding-bottom:12px;border-bottom:1px solid var(--border);}
  .week-label{font-size:10px;font-weight:500;letter-spacing:2px;text-transform:uppercase;color:var(--accent);flex-shrink:0;}
  .week-title{font-family:'Playfair Display',serif;font-size:18px;font-weight:500;flex:1;}
  .week-count{font-size:12px;color:var(--muted);font-weight:300;flex-shrink:0;}

import { requireAuth, getAuthToken, signOut } from './auth.js';
window.getToken  = getAuthToken;

await requireAuth();
var CURRENT_WEEK = {"weekOf":"2026-04-21","title":"Week of April 21","meals":[{"id":"slow-cooker-chili","label":"Meal A","day":"Tuesday","date":"4/21","icon":"🌶️","name":"Slow Cooker Chili","meta":"~15 min prep · 6 hrs slow cooker · Serves 8","ings":["1 tbsp olive oil","2 lbs lean ground beef","1 large yellow onion, finely chopped","3 cloves garlic, finely minced","2 (14.5 oz) cans diced tomatoes with mild green chilies","3 (8 oz) cans tomato sauce","½ cup beef broth","2 tbsp chili powder","2½ tsp ground cumin","2 tsp paprika","2 tsp unsweetened cocoa powder","1 tsp sugar","½ tsp ground coriander","Salt and pepper to taste","1 (15 oz) can dark red kidney beans, drained and rinsed","1 (15 oz) can light red kidney beans, drained and rinsed","Toppings: shredded cheddar, sour cream, green onions"],"steps":["Heat olive oil in a large skillet over medium-high. Sauté onion 3 minutes, then add garlic and cook 30 seconds. Transfer to a 6–7 quart slow cooker.","Return skillet to heat. Add beef and cook until browned, breaking it apart. Drain most of the fat. Pour into slow cooker.","Add diced tomatoes, tomato sauce, beef broth, all spices, salt, and pepper. Stir to combine.","Cover and cook on LOW for 5–6 hours.","Stir in both cans of kidney beans. Cook 2 more minutes until heated through.","Serve warm with shredded cheddar, sour cream, green onions, or tortilla chips."],"note":"💡 Set this up Monday morning and dinner is ready Tuesday. Use cans labeled 'mild' green chilies. Serves 8 — great leftovers all week. The cocoa powder is the secret depth builder."},{"id":"butter-cauliflower","label":"Meal B","day":"Wednesday","date":"4/22","icon":"🧈","name":"Butter Cauliflower","meta":"~65 min · One skillet · Vegetarian · Serves 4","ings":["1 medium head cauliflower, cut into florets","2 tbsp fresh lemon juice","2 tsp cornstarch","3 tbsp unsalted butter","1 yellow onion, finely chopped","3 garlic cloves, minced","2 tsp fresh ginger, grated","2 tbsp tomato paste","1 (8 oz) can tomato sauce","2 cups vegetable broth","½ cup heavy cream or full-fat coconut milk","Spices: 1 tsp turmeric (divided), 3 tsp garam masala (divided), ½ tsp cumin, 1 tsp paprika, ¼ tsp cinnamon, 1½ tsp salt","Pinch of cayenne (optional — skip for kids)","Basmati rice for serving","Fresh cilantro and plain Greek yogurt for garnish"],"steps":["Whisk together lemon juice, cornstarch, ½ tsp each of turmeric and garam masala, and ½ tsp salt. Set aside.","Heat 1 tbsp olive oil in a large skillet over medium-high. Cook cauliflower, tossing occasionally, until browned — 7–8 minutes. Reduce heat to medium, toss with the cornstarch-lemon mixture, cook another 7–8 minutes until charred in spots. Transfer to a bowl.","Add remaining 1 tbsp olive oil and the butter to the skillet. Cook onion until translucent, about 8 minutes. Stir in garlic, ginger, and tomato paste; cook 2 minutes until paste darkens.","Add remaining turmeric, garam masala, paprika, cinnamon, and cayenne (if using). Cook 1 minute stirring constantly.","Pour in tomato sauce and vegetable broth. Bring to a boil, reduce to a simmer. Stir in cream and return cauliflower to the pan. Simmer uncovered about 15 minutes until sauce thickens.","Cook basmati rice per package instructions. Serve butter cauliflower over rice, garnished with cilantro and a dollop of Greek yogurt."],"note":"💡 Skip the cayenne entirely — rich and flavorful without it. The lemon-cornstarch toss before the second sear gives the cauliflower its beautiful charred edges."},{"id":"turkey-veggie-bolognese-mafaldine","label":"Meal C","day":"Thursday","date":"4/23","icon":"🍝","name":"Turkey Veggie Bolognese with Mafaldine","meta":"~55 min · One pot · Serves 4–6","ings":["12 oz mafaldine pasta (or cavatappi, rigatoni — something with ridges)","¼ cup extra virgin olive oil","1 large sweet onion, diced","1 lb ground turkey (93% lean)","4 cloves garlic, minced","2 tsp granulated garlic","2 cups cremini mushrooms, roughly chopped","1 medium zucchini, diced into ½-inch cubes","4 tbsp tomato paste","1 (28 oz) can crushed or ground peeled tomatoes","1 (28 oz) can tomato puree","2 tsp sugar","1½ tsp kosher salt","½ tsp black pepper","2 tbsp fresh basil, chopped (or 1 tsp dried)","Freshly grated Parmesan for serving"],"steps":["Heat olive oil in a large heavy pot over medium heat. Sauté onion until translucent, 5–8 minutes.","Add garlic and cook 1 minute. Add ground turkey and cook, breaking it up, until browned — about 7–8 minutes. Drain any excess fat.","Add mushrooms and zucchini. Cook 5–6 minutes until softened and any liquid has evaporated.","Stir in tomato paste. Cook 1–2 minutes, stirring constantly, until it darkens and smells rich.","Add crushed tomatoes, tomato puree, granulated garlic, salt, pepper, sugar, and basil. Bring to a boil, then reduce to a low simmer. Cook uncovered 35–40 minutes, stirring occasionally, until thick and rich.","Bring a large pot of heavily salted water to a boil. Cook mafaldine al dente per package directions. Reserve 1 cup pasta water before draining.","Drain pasta and add directly to the sauce. Toss vigorously to coat, adding pasta water a splash at a time until sauce clings to every ruffle. Serve immediately with freshly grated Parmesan."],"note":"💡 Mafaldine — long, ruffled-edge pasta ribbons — are worth hunting for (Trader Joe's and Whole Foods often carry them). Cavatappi or rigatoni are great subs. The reserved pasta water is non-negotiable. Adapted from Kyle's Italian Meat Sauce recipe."}]};

var HISTORY = [{"weekOf":"2026-04-13","title":"Week of April 13","meals":[{"id":"sheet-pan-beef-broccoli","label":"Meal A","day":"Tuesday","date":"4/14","icon":"🥩","name":"Sheet Pan Beef & Broccoli","meta":"~30 min · Sheet pan · Serves 4","ings":["1½ lb flank steak or sirloin, sliced thin against the grain","4 cups broccoli florets","3 cloves garlic, minced","¼ cup low-sodium soy sauce","2 tbsp oyster sauce","1 tbsp sesame oil","1 tbsp honey","½ tsp ground ginger","2 tbsp cornstarch","2 tbsp vegetable oil","1½ cups jasmine rice","Sesame seeds + sliced green onions for garnish"],"steps":["Preheat oven to 425°F. Start rice on stovetop: 1½ cups rice + 3 cups water, bring to boil, reduce to low, cover, 18 min.","Slice beef very thin against the grain. Whisk together soy sauce, oyster sauce, sesame oil, honey, ginger, garlic, and cornstarch into a marinade. Toss beef in half the marinade and set aside 10 minutes.","Toss broccoli florets with vegetable oil, salt, and pepper on a large sheet pan. Roast 8 minutes.","Push broccoli to the sides. Spread marinated beef in a single layer in the center. Roast everything 8–10 more minutes until beef is cooked through and broccoli is lightly charred.","Warm remaining marinade in a small saucepan over medium heat, adding a splash of water to thin slightly, until it simmers and thickens into a glossy sauce.","Serve beef and broccoli over rice. Drizzle with extra sauce. Garnish with sesame seeds and green onions."],"note":"💡 Slice the beef as thin as possible. The marinade does double duty as the finishing sauce."},{"id":"black-bean-sweet-potato-enchiladas","label":"Meal B","day":"Wednesday","date":"4/15","icon":"🫘","name":"Black Bean & Sweet Potato Enchiladas","meta":"~40 min · Baked · Vegetarian · Serves 4","ings":["2 large sweet potatoes, peeled and diced small","1 can (15 oz) black beans, drained and rinsed","½ cup frozen corn","1 small onion, diced","3 cloves garlic, minced","1 tsp cumin, 1 tsp chili powder, ½ tsp smoked paprika, ½ tsp garlic powder","Salt and pepper to taste","8 small corn tortillas","1 can (10 oz) mild red enchilada sauce","2 cups shredded Mexican cheese blend","Olive oil, sour cream and cilantro for serving"],"steps":["Preheat oven to 400°F. Toss diced sweet potato with olive oil and spices. Roast 20 minutes until tender and caramelized.","Sauté onion and garlic in olive oil until soft. Stir in black beans and corn; warm through.","Combine roasted sweet potato with the bean mixture.","Warm tortillas in a dry skillet so they roll without cracking. Spoon filling into each tortilla, roll tightly, place seam-side down in a greased 9x13 dish.","Pour enchilada sauce over top. Sprinkle cheese all over.","Bake 20 minutes until cheese is melted and bubbling. Serve with sour cream and cilantro."],"note":"💡 Warming the tortillas is the key step — cold corn tortillas crack when rolled."},{"id":"lemon-herb-chicken-meatballs-orzo","label":"Meal C","day":"Thursday","date":"4/16","icon":"🍋","name":"Lemon Herb Chicken Meatballs with Orzo","meta":"~35 min · One pan · Serves 4","ings":["1 lb ground chicken","¼ cup breadcrumbs","1 egg","¼ cup grated Parmesan","2 tbsp fresh parsley, chopped","1 tsp dried oregano","Zest of 1 lemon","3 cloves garlic, minced (divided)","Salt and black pepper","2 tbsp olive oil","1 small onion, finely diced","¼ cup white wine or chicken broth","2½ cups chicken broth","1½ cups orzo","Juice of 1 lemon","½ cup heavy cream","2 cups fresh baby spinach","Extra Parmesan to finish"],"steps":["Mix ground chicken, breadcrumbs, egg, Parmesan, parsley, oregano, lemon zest, half the garlic, salt, and pepper. Roll into 16–18 small meatballs.","Heat olive oil in a large deep skillet over medium-high. Sear meatballs in batches, browning on 2–3 sides, about 4–5 minutes. Remove and set aside.","Sauté onion until soft, 3–4 minutes. Add remaining garlic and cook 30 seconds. Deglaze with white wine.","Pour in chicken broth and bring to a simmer. Stir in orzo and cook 7–8 minutes, stirring often.","Stir in lemon juice and heavy cream. Nestle meatballs back in. Cook 4–5 more minutes until meatballs are cooked through.","Add spinach and stir until wilted. Finish with extra Parmesan and more lemon."],"note":"💡 Stir the orzo frequently so it doesn't stick. Kids love the little meatballs."}]},{"weekOf":"2026-04-06","title":"Week of April 6","meals":[{"id":"creamy-sausage-and-peppers-pasta","label":"Meal D","day":"Sunday","date":"4/5","icon":"🍝","name":"Creamy Sausage and Peppers Pasta","meta":"~40 min · One pan · Serves 4","ings":["8 oz uncooked pasta (bucatini)","1 lb Italian sausage","1 tbsp olive oil","½ medium onion, chopped","1 red bell pepper, 1 yellow bell pepper (chopped)","1 tbsp butter","2–3 cloves garlic, minced","1 tsp flour","1 cup heavy cream","½ tsp Dijon mustard","2 cups fresh baby spinach","Salt, pepper, Parmesan"],"steps":["Boil pasta al dente per package directions.","Brown sausage in a skillet, breaking it up. Transfer to plate.","Cook onion and peppers in oil until softened, 7–8 minutes.","Reduce heat. Add butter and garlic; sprinkle in flour and cook 1 minute.","Stir in cream and Dijon. Thickens quickly.","Add sausage and spinach. Splash pasta water in, drain pasta, add to skillet. Toss and serve with Parmesan."],"note":"Use ground sausage or remove meat from casings."},{"id":"sausage-white-bean-soup","label":"Meal A","day":"Monday","date":"4/6","icon":"🍲","name":"Sausage White Bean Soup","meta":"~35 min · One pot · Serves 4–6","ings":["1 lb mild Italian sausage","1 tbsp olive oil","1 medium onion, diced","3 cloves garlic, minced","2 carrots, sliced","2 stalks celery, chopped","1 can (15 oz) white beans, drained","4 cups chicken broth","1 tsp thyme, 1 tsp rosemary","Salt, pepper, fresh parsley"],"steps":["Brown sausage, remove and set aside.","Cook onion, garlic, carrots, celery until softened.","Return sausage. Add white beans, broth, herbs, salt, pepper. Simmer.","Cover and simmer 20–25 minutes. Garnish with parsley."],"note":"Mash some beans before adding for creamier texture."},{"id":"air-fryer-fish-tacos","label":"Meal B","day":"Tuesday","date":"4/7","icon":"🌮","name":"Air Fryer Fish Tacos with Cilantro Lime Slaw","meta":"~20 min · Air fryer · Serves 4","ings":["1½ lb tilapia or white fish","Fish rub: chili powder, oregano, garlic powder, paprika, cayenne, cumin, salt, pepper","Cilantro lime slaw: coleslaw mix, mayo, lime juice, garlic, cilantro","Tortillas for serving"],"steps":["Spray air fryer basket with oil. Mix spices.","Pat fish dry, brush with olive oil, coat with spice rub, spritz with oil.","Air fry at 400°F for 8–10 minutes.","Toss together cilantro lime slaw.","Cut fish into pieces and serve in tortillas with slaw."],"note":"No air fryer? Bake at 400°F for about 15 minutes."},{"id":"miso-glazed-salmon-bowls","label":"Meal C","day":"Wednesday","date":"4/8","icon":"🐟","name":"Miso Glazed Salmon Bowls","meta":"~30 min · Sheet pan + rice · Serves 4","ings":["4 salmon fillets (~6 oz each)","3 tbsp white miso paste","2 tbsp soy sauce, 2 tbsp honey, 1 tbsp rice vinegar, 1 tsp sesame oil","Fresh ginger, garlic","Jasmine rice, cucumber, carrots, edamame, sesame seeds, green onions"],"steps":["Cook rice. Whisk together miso glaze.","Spoon glaze over salmon on a foil-lined sheet.","Broil at 400°F for 12–15 minutes, basting halfway.","Assemble bowls with rice, salmon, veggies. Drizzle with remaining glaze."],"note":"Store components separately and assemble fresh."}]},{"weekOf":"2026-03-29","title":"Week of March 29","meals":[{"id":"chicken-pineapple-fried-rice","name":"Chicken Pineapple Fried Rice","day":"Tuesday","date":"3/31","label":"Meal A","icon":"🍚","meta":"~30 min · Wok or skillet · Serves 4","ings":["3 cups cooked jasmine rice, cold","½ lb boneless skinless chicken thighs","1 cup frozen mixed vegetables","1 cup pineapple, diced","½ cup onion","2 cloves garlic","2 tbsp vegetable oil","1½ tbsp soy sauce, 1 tsp fish sauce","Marinade: soy sauce, sesame oil, cornstarch, baking soda"],"steps":["Cook rice ahead and refrigerate overnight.","Slice and marinate chicken.","Fry chicken, remove. Sauté garlic and onion, add vegetables and pineapple.","Push to side, add rice with soy and fish sauce. Stir-fry.","Add chicken back, toss and serve."],"note":"💡 Cold rice is essential — non-negotiable."},{"id":"greek-chicken-bowls","name":"Greek Chicken Bowls with Tzatziki","day":"Wednesday","date":"4/1","label":"Meal B","icon":"🥙","meta":"~35 min · Bowls · Serves 4","ings":["1½ lb chicken thighs, lemon-oregano marinade","1 English cucumber","1 cup plain Greek yogurt, dill","Cherry tomatoes, red onion, rice","Hummus, feta, fresh parsley"],"steps":["Marinate chicken overnight.","Make tzatziki: grated cucumber + yogurt + garlic + dill.","Cook rice. Make cucumber salad.","Cook chicken until golden, rest and slice.","Build bowls: rice, chicken, hummus, cucumber salad, tzatziki, feta."],"note":"💡 Marinate the night before."},{"id":"asian-turkey-lettuce-wraps","name":"Asian Turkey Lettuce Wraps","day":"Thursday","date":"4/2","label":"Meal C","icon":"🥬","meta":"~25 min · Skillet · Serves 4","ings":["1 lb ground turkey","Hoisin, soy sauce, rice vinegar, sesame oil","Water chestnuts, butter lettuce","Green onions, sesame seeds, shredded carrots"],"steps":["Whisk sauce ingredients.","Sauté garlic and ginger, add turkey, cook through.","Add water chestnuts and sauce, cook 2 minutes.","Serve in lettuce cups with garnishes."],"note":"💡 Let kids build their own lettuce tacos."}]},{"weekOf":"2026-03-22","title":"Week of March 22","meals":[{"id":"shakshuka","name":"Shakshuka","day":"Tuesday","date":"3/24","label":"Meal A","icon":"🍳","meta":"~30 min · One pan · Vegetarian · Serves 4–6","ings":["2 tbsp olive oil, 1 onion, 1 red bell pepper, 4 garlic cloves","Paprika, cumin, chili powder","1 (28-oz) can whole peeled tomatoes","6 large eggs","Cilantro, parsley, feta, pita"],"steps":["Sauté onion and bell pepper 5 minutes.","Add garlic and spices, cook 1 minute.","Add tomatoes, break down, simmer 5 minutes.","Make 6 wells, crack eggs in each.","Cover and cook 5–8 minutes until eggs set."]},{"id":"lemon-herb-baked-cod","name":"Lemon Herb Baked Cod with Asparagus & Rice","day":"Wednesday","date":"3/25","label":"Meal B","icon":"🐠","meta":"~35 min · Sheet pan · Serves 4","ings":["4 cod fillets","Lemon, olive oil, garlic powder, thyme","1 lb asparagus, white rice"],"steps":["Preheat 400°F. Start rice.","Roast asparagus 8 min.","Add cod with herb-lemon mixture, bake 12–15 min.","Serve over rice."]},{"id":"turkey-black-bean-taco-bowls","name":"Turkey & Black Bean Taco Bowls","day":"Thursday","date":"3/26","label":"Meal C","icon":"🌮","meta":"~30 min · Serves 4","ings":["1 lb ground turkey, taco spices","Black beans, avocado, cherry tomatoes","Rice, lime, cheese, sour cream"],"steps":["Cook rice.","Brown turkey with onion, garlic, taco spices.","Add black beans and warm through.","Build bowls with all toppings."],"note":"💡 Great leftovers."}]},{"weekOf":"2026-03-19","title":"Week of March 16","meals":[{"id":"sheet-pan-lemon-herb-salmon","name":"Sheet Pan Lemon Herb Salmon & Veggies","day":"Tuesday","date":"3/17","label":"Meal A","icon":"🐟","meta":"~35 min · One pan · Serves 4–6","ings":["4–6 salmon fillets","Lemon, olive oil, garlic powder, dill","Broccoli, cherry tomatoes, zucchini"],"steps":["Preheat 425°F. Roast veggies 12 min.","Add salmon with herb-lemon mixture.","Bake 12–15 min.","Serve with lemon wedges."]},{"id":"chicken-tikka-masala-cauliflower","name":"Chicken Tikka Masala + Cauliflower","day":"Wednesday","date":"3/18","label":"Meal B","icon":"🍗","meta":"~45 min · Serves 4–6","ings":["1.5 lbs chicken breast, yogurt-spice marinade","1 head cauliflower","Tomato sauce, heavy cream, basmati rice, naan"],"steps":["Marinate chicken overnight.","Roast cauliflower at 425°F.","Sear chicken, build sauce.","Add tomato sauce and cream, return chicken and cauliflower.","Simmer until thick. Serve over rice."]},{"id":"pesto-chicken-tortellini-veggies","name":"Pesto Chicken Tortellini & Veggies","day":"Thursday","date":"3/19","label":"Meal C","icon":"🌿","meta":"~40 min · One pan · Serves 4","ings":["1 lb chicken thighs, sun-dried tomatoes","Asparagus, basil pesto","Cherry tomatoes, refrigerated tortellini"],"steps":["Cook chicken with sun-dried tomatoes.","Cook asparagus separately.","Cook tortellini, drain.","Toss chicken with pesto, add tortellini and tomatoes.","Plate with asparagus."]}]}];

var CORE_IDS={"slow-cooker-chili":true,"creamy-sausage-and-peppers-pasta":true,"zucchini-tomato-italian-sausage-soup":true,"vegetarian-quesadillas":true,"creamy-chorizo-gnocchi":true,"easy-weeknight-salmon-sushi-bowls":true,"butternut-squash-ravioli-with-brown-butter-sage":true,"creamy-chicken-tortilla-soup":true,"lentil-soup-with-sausage-chard-and-garlic":true,"best-lasagna":true,"italian-meat-sauce":true,"vegetarian-grain-bowl-meal-prep":true,"air-fryer-fish-tacos-with-cilantro-lime-slaw":true,"creamy-tomato-gnocchi-with-burrata":true,"white-chicken-chili":true,"teriyaki-chicken-tacos-with-sesame-cucumber-slaw":true,"sausage-white-bean-soup":true,"slow-cooker-chicken-pot-pie":true,"creamy-parmesan-sausage-ditalini-soup":true,"seared-salmon-with-lemon-orzo":true,"falafel-bowl-with-tahini-dressing":true,"one-pan-coconut-curry-salmon":true,"ground-turkey-teriyaki-stir-fry":true,"corn-chowder":true,"pesto-chicken-tortellini-and-veggies":true,"butter-cauliflower":true,"vegan-mushroom-bourguignon":true,"louisiana-red-beans-and-rice":true,"spicy-garlic-chicken-bowl-with-hummus":true,"lemon-chili-grilled-chicken-bowls-with-hummus":true,"homemade-crunchwrap-supreme":true,"chicken-pineapple-fried-rice":true,"easy-shrimp-alfredo":true,"creamy-spinach-and-mushroom-tortellini":true,"garlic-sesame-noodles":true,"shakshuka":true,"miso-glazed-salmon-bowls":true,"turkey-veggie-bolognese-mafaldine":true};

function renderWeek(week,isCurrent){var entry=document.createElement('div');entry.className='week-entry';var mealCount=week.meals?week.meals.length:0;var labelText=isCurrent?'This Week':'Week of';var header=document.createElement('div');header.className='week-header';header.innerHTML='<span class="week-label">'+labelText+'</span><span class="week-title">'+(week.title||week.weekOf)+'</span><span class="week-count">'+mealCount+' meal'+(mealCount!==1?'s':'')+'</span>';entry.appendChild(header);(week.meals||[]).forEach(function(meal,i){var mealLabel=(meal.label||('Meal '+String.fromCharCode(65+i)))+(meal.day?' · '+meal.day+' '+(meal.date||')':'');entry.appendChild(RecipeCard.makeCard(meal,mealLabel));});return entry;}

RecipeCard.init({coreIds:CORE_IDS,onSaveChange:function(){RecipeCard.applyBadges();},onReady:function(){RecipeCard.applyBadges();}});
var totalWeeks=1+HISTORY.length;
document.getElementById('headerMeta').textContent=totalWeeks+' week'+(totalWeeks!==1?'s':'')+' logged';
var journal=document.getElementById('journal');
journal.appendChild(renderWeek(CURRENT_WEEK,true));
HISTORY.forEach(function(week){journal.appendChild(renderWeek(week,false));});
</script>
</body>
</html>
