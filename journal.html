<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Journal — Fox &amp; Bear Kitchen</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --cream: #faf7f2; --ink: #1a1a1a; --muted: #7a7264;
    --accent: #c8622a; --accent-light: #f5e8de; --border: #e4ded5;
    --check: #2d7a4f; --check-light: #e8f4ed;
    --ck-bg: #131311; --ck-dim: #252520; --ck-border: #2e2d28;
    --ck-text: #f0ebe0; --ck-muted: #6a6860; --ck-accent: #d4732e; --ck-done: #2d7a4f;
  }
  *,*::before,*::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'DM Sans', sans-serif; background: var(--cream); color: var(--ink); min-height: 100vh; -webkit-font-smoothing: antialiased; }
  .site-nav { max-width: 680px; margin: 0 auto; display: flex; padding: 0 20px; border-bottom: 1px solid var(--border); }
  .nav-link { font-size: 12px; font-weight: 500; letter-spacing: .08em; text-transform: uppercase; color: var(--muted); text-decoration: none; padding: 14px 16px 12px; border-bottom: 2px solid transparent; margin-bottom: -1px; transition: color .15s; }
  .nav-link:hover { color: var(--ink); }
  .nav-link.active { color: var(--accent); border-bottom-color: var(--accent); }
  .header { max-width: 680px; margin: 0 auto 36px; border-bottom: 1px solid var(--border); padding: 28px 20px 24px; }
  .header-eyebrow { font-weight: 500; font-size: 11px; letter-spacing: 2.5px; text-transform: uppercase; color: var(--accent); margin-bottom: 10px; }
  h1 { font-family: 'Playfair Display', serif; font-size: 36px; font-weight: 700; line-height: 1.1; margin-bottom: 8px; }
  .header-meta { font-size: 13px; color: var(--muted); font-weight: 300; }
  .journal { max-width: 680px; margin: 0 auto; padding: 0 20px 60px; display: flex; flex-direction: column; gap: 40px; }
  .week-entry { display: flex; flex-direction: column; gap: 12px; }
  .week-header { display: flex; align-items: baseline; gap: 12px; padding-bottom: 12px; border-bottom: 1px solid var(--border); }
  .week-label { font-size: 10px; font-weight: 500; letter-spacing: 2px; text-transform: uppercase; color: var(--accent); flex-shrink: 0; }
  .week-title { font-family: 'Playfair Display', serif; font-size: 18px; font-weight: 500; flex: 1; }
  .week-count { font-size: 12px; color: var(--muted); font-weight: 300; flex-shrink: 0; }

  /* Meal cards */
  .meal-card { background: white; border: 1px solid var(--border); border-radius: 10px; overflow: hidden; cursor: pointer; transition: border-color .15s, box-shadow .15s; -webkit-tap-highlight-color: transparent; }
  .meal-card:hover { border-color: #bbb; box-shadow: 0 2px 8px rgba(0,0,0,.06); }
  .meal-card-header { display: flex; align-items: center; gap: 14px; padding: 14px 16px; user-select: none; }
  .meal-icon { font-size: 26px; flex-shrink: 0; }
  .meal-info { flex: 1; min-width: 0; }
  .meal-label { font-size: 10px; letter-spacing: 1.5px; text-transform: uppercase; color: var(--muted); font-weight: 500; margin-bottom: 2px; }
  .meal-name { font-family: 'Playfair Display', serif; font-size: 15px; font-weight: 500; }
  .meal-meta { font-size: 11px; color: var(--muted); margin-top: 2px; font-weight: 300; }
  .card-chevron { font-size: 20px; color: var(--border); flex-shrink: 0; line-height: 1; }

  /* Saved badge on journal cards */
  .saved-badge {
    display: none; align-items: center; gap: 4px;
    font-size: 10px; font-weight: 600; letter-spacing: .06em; text-transform: uppercase;
    color: var(--accent); background: var(--accent-light);
    padding: 3px 8px; border-radius: 99px; flex-shrink: 0;
  }
  .saved-badge.visible { display: flex; }
  .saved-badge svg { width: 10px; height: 10px; fill: var(--accent); }

  .empty-history { text-align: center; padding: 40px 20px; color: var(--muted); font-size: 14px; font-weight: 300; line-height: 1.6; border: 1px dashed var(--border); border-radius: 10px; }
  .empty-history strong { display: block; font-family: 'Playfair Display', serif; font-size: 16px; font-weight: 500; color: var(--ink); margin-bottom: 6px; }

  /* Recipe detail overlay */
  #rd-overlay { position: fixed; inset: 0; background: var(--cream); z-index: 1000; display: flex; flex-direction: column; transform: translateY(100%); transition: transform .38s cubic-bezier(.4,0,.2,1); overflow: hidden; }
  #rd-overlay.open { transform: translateY(0); }
  .rd-bar { display: flex; align-items: center; gap: 10px; padding: calc(16px + env(safe-area-inset-top,0px)) 16px 14px; border-bottom: 1px solid var(--border); flex-shrink: 0; background: var(--cream); }
  .rd-back { flex-shrink: 0; width: 36px; height: 36px; border-radius: 50%; background: white; border: 1px solid var(--border); color: var(--ink); font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center; -webkit-tap-highlight-color: transparent; transition: background .15s; }
  .rd-back:active { background: #eee; }
  .rd-name { flex: 1; font-family: 'Playfair Display', serif; font-size: 17px; font-weight: 500; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

  /* Save button */
  .rd-save-btn {
    flex-shrink: 0; display: inline-flex; align-items: center; gap: 6px;
    background: white; color: var(--muted);
    border: 1px solid var(--border); border-radius: 100px;
    font-family: 'DM Sans', sans-serif; font-size: 12px; font-weight: 500;
    padding: 8px 14px; cursor: pointer;
    -webkit-tap-highlight-color: transparent;
    transition: all .15s;
  }
  .rd-save-btn svg { width: 12px; height: 12px; fill: none; stroke: currentColor; stroke-width: 2; transition: all .15s; }
  .rd-save-btn.saved {
    background: var(--accent-light); color: var(--accent); border-color: #e0bfad;
  }
  .rd-save-btn.saved svg { fill: var(--accent); stroke: var(--accent); }
  .rd-save-btn:active { transform: scale(.94); }

  .rd-cook-btn { flex-shrink: 0; display: inline-flex; align-items: center; gap: 6px; background: var(--ink); color: var(--cream); border: none; border-radius: 100px; font-family: 'DM Sans', sans-serif; font-size: 12px; font-weight: 500; padding: 9px 16px; cursor: pointer; -webkit-tap-highlight-color: transparent; transition: transform .12s, background .15s; }
  .rd-cook-btn:active { transform: scale(.94); background: #333; }
  .rd-cook-btn svg { width: 11px; height: 11px; fill: currentColor; }
  .rd-body { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; padding: 28px 20px calc(48px + env(safe-area-inset-bottom,0px)); }
  .rd-inner { max-width: 640px; margin: 0 auto; }
  .rd-note { margin-bottom: 20px; padding: 11px 14px; background: var(--accent-light); border-radius: 8px; font-size: 13px; color: #7a4520; line-height: 1.5; }
  .rd-cols { display: grid; grid-template-columns: 1fr 1.4fr; gap: 28px; }
  @media (max-width: 520px) { .rd-cols { grid-template-columns: 1fr; } }
  .rd-section-title { font-size: 10px; letter-spacing: 2px; text-transform: uppercase; font-weight: 500; color: var(--accent); margin-bottom: 12px; }
  .rd-ing-list { list-style: none; display: flex; flex-direction: column; gap: 5px; }
  .rd-ing-list li { font-size: 13px; color: var(--ink); line-height: 1.45; padding-left: 12px; position: relative; }
  .rd-ing-list li::before { content: '·'; position: absolute; left: 0; color: var(--muted); }
  .rd-step-list { list-style: none; display: flex; flex-direction: column; gap: 10px; }
  .rd-step-list li { font-size: 13px; color: var(--ink); line-height: 1.55; display: flex; gap: 10px; }
  .rd-step-num { font-family: 'Playfair Display', serif; font-size: 14px; font-weight: 700; color: var(--accent); flex-shrink: 0; min-width: 16px; padding-top: 1px; }

  /* Cooking mode overlay */
  #ck-overlay { position: fixed; inset: 0; background: var(--ck-bg); z-index: 9999; display: flex; flex-direction: column; transform: translateY(100%); transition: transform .38s cubic-bezier(.4,0,.2,1); overflow: hidden; padding-bottom: env(safe-area-inset-bottom,0px); }
  #ck-overlay.open { transform: translateY(0); }
  .ck-bar { display: flex; align-items: center; gap: 12px; padding: calc(16px + env(safe-area-inset-top,0px)) 18px 14px; border-bottom: 1px solid var(--ck-border); flex-shrink: 0; }
  .ck-title { flex: 1; font-size: 13px; color: var(--ck-muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .ck-pips { display: flex; gap: 5px; flex-shrink: 0; }
  .ck-pip { width: 22px; height: 3px; border-radius: 2px; background: var(--ck-border); transition: background .3s; }
  .ck-pip.on { background: var(--ck-accent); }
  .ck-x { flex-shrink: 0; width: 32px; height: 32px; border-radius: 50%; background: var(--ck-dim); border: 1px solid var(--ck-border); color: var(--ck-text); font-size: 16px; cursor: pointer; display: flex; align-items: center; justify-content: center; -webkit-tap-highlight-color: transparent; transition: background .15s; }
  .ck-x:active { background: #38372f; }
  .ck-panels-wrap { flex: 1; overflow: hidden; position: relative; }
  .ck-track { display: flex; width: 200%; height: 100%; transition: transform .35s cubic-bezier(.4,0,.2,1); }
  .ck-track.flipped { transform: translateX(-50%); }
  .ck-panel { flex: 0 0 50%; height: 100%; display: flex; flex-direction: column; overflow: hidden; }
  .ck-ing-scroll { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; padding: 36px 28px 100px; }
  .ck-panel-tag { font-size: 11px; font-weight: 600; letter-spacing: .2em; text-transform: uppercase; color: var(--ck-accent); display: block; margin-bottom: 20px; }
  .ck-ing-headline { font-family: 'Playfair Display', serif; font-size: clamp(24px,7vw,44px); font-weight: 700; color: var(--ck-text); line-height: 1.1; margin-bottom: 32px; }
  .ck-ings { list-style: none; }
  .ck-ing-row { display: flex; align-items: baseline; gap: 16px; padding: 16px 0; border-bottom: 1px solid var(--ck-border); }
  .ck-ing-row:last-child { border-bottom: none; }
  .ck-qty { font-family: 'Playfair Display', serif; font-size: 16px; font-weight: 600; color: var(--ck-accent); min-width: 54px; text-align: right; flex-shrink: 0; }
  .ck-item-name { font-size: clamp(16px,4vw,20px); color: var(--ck-text); font-weight: 300; line-height: 1.35; }
  .ck-swipe-hint-ing { position: absolute; bottom: 24px; left: 0; right: 50%; display: flex; align-items: center; justify-content: center; gap: 7px; color: var(--ck-muted); font-size: 12px; pointer-events: none; transition: opacity .5s; }
  .ck-swipe-hint-ing.gone { opacity: 0; }
  .ck-step-vp { flex: 1; position: relative; overflow: hidden; touch-action: none; }
  .ck-slide { position: absolute; inset: 0; display: flex; flex-direction: column; justify-content: center; padding: 28px 32px 16px; gap: 10px; opacity: 0; transform: translateY(48px); transition: opacity .28s ease, transform .28s ease; pointer-events: none; }
  .ck-slide.active { opacity: 1; transform: none; pointer-events: all; }
  .ck-slide.exit-up { opacity: 0; transform: translateY(-48px); pointer-events: none; }
  .ck-slide.exit-down { opacity: 0; transform: translateY(48px); pointer-events: none; }
  .ck-step-big { font-family: 'Playfair Display', serif; font-size: clamp(64px,20vw,100px); font-weight: 700; color: var(--ck-accent); line-height: 1; letter-spacing: -.03em; }
  .ck-step-of { font-size: 13px; color: var(--ck-muted); margin-top: -6px; }
  .ck-step-body { font-size: clamp(17px,4.2vw,21px); color: var(--ck-text); line-height: 1.62; font-weight: 300; margin-top: 8px; }
  .ck-swipe-hint-steps { position: absolute; bottom: 16px; left: 0; right: 0; display: flex; align-items: center; justify-content: center; gap: 7px; color: var(--ck-muted); font-size: 12px; pointer-events: none; transition: opacity .5s; }
  .ck-swipe-hint-steps.gone { opacity: 0; }
  .ck-footer { flex-shrink: 0; display: flex; align-items: center; justify-content: space-between; padding: 14px 22px 18px; border-top: 1px solid var(--ck-border); }
  .ck-nav { width: 46px; height: 46px; border-radius: 50%; background: var(--ck-dim); border: 1px solid var(--ck-border); color: var(--ck-text); font-size: 20px; display: flex; align-items: center; justify-content: center; cursor: pointer; -webkit-tap-highlight-color: transparent; transition: background .15s, opacity .2s; flex-shrink: 0; }
  .ck-nav:active:not(:disabled) { background: #38372f; }
  .ck-nav:disabled { opacity: .2; cursor: default; }
  .ck-dots { display: flex; gap: 7px; align-items: center; flex-wrap: wrap; justify-content: center; flex: 1; padding: 0 12px; }
  .ck-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--ck-border); transition: background .3s, transform .3s; flex-shrink: 0; }
  .ck-dot.on { background: var(--ck-accent); transform: scale(1.5); }
  .ck-dot.done { background: var(--ck-done); }
  .hintsvg { width: 15px; height: 15px; fill: none; stroke: currentColor; stroke-width: 1.5; stroke-linecap: round; stroke-linejoin: round; }
</style>
</head>

<script>
// ── Inlined data ──────────────────────────────────────────────────────────
var CURRENT_WEEK = {"weekOf":"2026-04-06","title":"Week of April 6","meals":[{"id":"creamy-sausage-and-peppers-pasta","label":"Meal D","day":"Sunday","date":"4/5","icon":"🍝","name":"Creamy Sausage and Peppers Pasta","meta":"~40 min · One pan · Serves 4","ings":["8 oz uncooked pasta (bucatini works great)","1 lb Italian sausage (ground or removed from casings)","1 tbsp olive oil","½ medium onion, chopped","1 medium red bell pepper, chopped","1 medium yellow bell pepper, chopped","1 tbsp butter","2–3 cloves garlic, minced","1 tsp flour","1 cup heavy/whipping cream","½ tsp Dijon mustard","2 cups fresh baby spinach (packed)","Salt & pepper to taste","Freshly grated Parmesan cheese"],"steps":["Boil a large salted pot of water and cook pasta al dente per package directions.","Brown sausage in a skillet over medium-high heat, breaking it up as you go (8–10 minutes). Transfer to a paper towel-lined plate.","Add oil to the skillet with onion and both bell peppers. Cook until lightly browned and softened, about 7–8 minutes.","Reduce heat to medium. Add butter and garlic; once butter melts, sprinkle in flour and cook 1 minute, stirring well.","Stir in cream and Dijon mustard. Sauce should thicken quickly — don't cook more than a minute before next step.","Add cooked sausage and spinach to the skillet and stir to combine.","Splash in a couple tablespoons of pasta water, then drain pasta and add to the skillet. Toss until spinach wilts and pasta is coated. Serve immediately with Parmesan."],"note":"Use ground sausage or buy links and remove the meat from casings."},{"id":"sausage-white-bean-soup","label":"Meal A","day":"Monday","date":"4/6","icon":"🍲","name":"Sausage White Bean Soup","meta":"~35 min · One pot · Serves 4–6","ings":["1 lb mild Italian sausage, crumbled","1 tbsp olive oil","1 medium onion, diced","3 cloves garlic, minced","2 carrots, peeled and sliced","2 stalks celery, chopped","1 can (15 oz) white beans, drained and rinsed","4 cups chicken broth","1 tsp dried thyme","1 tsp dried rosemary","Salt and pepper to taste","Fresh parsley for garnish"],"steps":["Heat olive oil in a large pot over medium heat. Brown sausage, breaking it apart. Remove and set aside.","In the same pot, cook onion, garlic, carrots, and celery until softened, about 5–7 minutes.","Return sausage to pot. Add white beans, broth, thyme, rosemary, salt, and pepper. Stir and bring to a simmer.","Cover and simmer on low 20–25 minutes. Serve garnished with fresh parsley."],"note":"Mash some of the beans before adding for a creamier texture."},{"id":"air-fryer-fish-tacos","label":"Meal B","day":"Tuesday","date":"4/7","icon":"🌮","name":"Air Fryer Fish Tacos with Cilantro Lime Slaw","meta":"~20 min · Air fryer · Serves 4","ings":["1½ lb tilapia or white fish (mahi mahi, cod, etc.)","Fish rub: 1 tsp chili powder, ½ tsp each oregano/garlic powder/paprika, ¼ tsp each onion powder/cumin, salt & pepper","Cilantro lime slaw: 2½ cups coleslaw mix, 3 tbsp mayo, 1 tbsp lime juice, 1 garlic clove minced, ⅓ cup chopped cilantro, ¼ tsp each salt & pepper","Tortillas for serving"],"steps":["Spray the air fryer basket with oil. Mix the spices together.","Pat fish dry and lay in the air fryer basket. Brush with olive oil, coat generously with spice rub, and spritz with oil.","Preheat air fryer to 400°F. Cook fish 8–10 minutes until opaque and flaking (internal temp 145°F).","While fish cooks, toss together the cilantro lime slaw. Adjust salt and lime to taste.","Remove fish, cut into pieces, and serve in tortillas topped with slaw and extra lime."],"note":"No air fryer? Bake at 400°F for about 15 minutes. Do not flip fish in the air fryer — it may fall apart."},{"id":"miso-glazed-salmon-bowls","label":"Meal C","day":"Wednesday","date":"4/8","icon":"🐟","name":"Miso Glazed Salmon Bowls","meta":"~30 min · Sheet pan + rice · Serves 4","ings":["4 salmon fillets (~6 oz each), skinless","3 tbsp white miso paste","2 tbsp low-sodium soy sauce","2 tbsp honey or maple syrup","1 tbsp rice vinegar","1 tsp toasted sesame oil","1 tsp fresh ginger, grated","2 cloves garlic, minced","1½ cups jasmine rice","1 large English cucumber, thinly sliced","1 cup shredded carrots","1 cup shelled edamame (thawed)","2–3 green onions, sliced","1 tbsp sesame seeds"],"steps":["Cook jasmine rice per package instructions.","Whisk together miso paste, soy sauce, honey, rice vinegar, sesame oil, ginger, and garlic to make the glaze.","Pat salmon dry. Place on a foil-lined baking sheet. Spoon half the glaze over each fillet.","Broil at 400°F for 12–15 minutes, basting with remaining glaze halfway through, until salmon flakes easily.","Assemble bowls: rice base topped with salmon, cucumber, carrots, and edamame. Drizzle with any remaining glaze.","Garnish with sliced green onions and sesame seeds."],"note":"Leftovers keep well — store components separately and assemble fresh."}]};

var HISTORY = [{"weekOf":"2026-03-29","title":"Week of March 29","meals":[{"id":"chicken-pineapple-fried-rice","name":"Chicken Pineapple Fried Rice","day":"Tuesday","date":"3/31","label":"Meal A","icon":"🍚","meta":"~30 min · Wok or skillet · Serves 4","ings":["3 cups cooked jasmine rice, cold — cook and refrigerate Monday or day before","½ lb boneless skinless chicken thighs, sliced thin","1 cup frozen mixed vegetables (peas, carrots, corn, green beans)","1 cup pineapple, diced (fresh or canned)","½ cup onion, finely diced","2 cloves garlic, minced","2 tablespoons vegetable oil","1½ tablespoons soy sauce","1 teaspoon fish sauce","¼ tsp salt, ¼ tsp black pepper","Green onions, sliced (garnish)","Sesame seeds (garnish)","Marinade: 2 tsp soy sauce + 2 tsp sesame oil + 1 tsp cornstarch + ¼ tsp baking soda"],"steps":["Cook rice ahead of time (Monday): Cook 1½ cups jasmine rice. Let cool completely, then refrigerate overnight. Cold rice is the key to good fried rice — fresh rice will turn mushy.","Slice chicken thighs thin and toss with marinade (soy sauce, sesame oil, cornstarch, baking soda). Let sit 10–15 minutes.","Break up the cold rice with clean hands or a rice paddle into individual grains. Set aside.","Heat 1 tbsp vegetable oil in a large wok or skillet over medium-high. Fry chicken in a single layer until cooked through, about 4–5 minutes. Remove and set aside.","Sauté garlic and onion in remaining oil until fragrant, 1–2 minutes. Add frozen vegetables and pineapple. Cook 3–4 minutes, letting liquids evaporate fully.","Push everything to the side. Add remaining oil. Add rice and toss everything together. Drizzle soy sauce and fish sauce over top. Stir-fry 2–3 minutes until rice is hot and slightly caramelized.","Add chicken back to pan. Toss everything together and heat through. Serve hot with sliced green onions and sesame seeds."],"note":"💡 Pre-cook the rice Monday — this is non-negotiable for good fried rice. Also great for using up pantry staples. Totally ki erb-lemon mixture generously over each fillet. Lay lemon slices on top.","Bake 12–15 minutes until cod flakes easily with a fork. Internal temp 145°F. Thin fillets cook fast — check at 12 min.","Serve cod and asparagus over rice. Add a small pat of butter on the fish if desired. Squeeze extra lemon over top."],"note":"💡 Make a double batch of rice tonight — reheat for Thursday's taco bowls. The lemon slices caramelize in the oven and are delicious."},{"id":"turkey-black-bean-taco-bowls","name":"Turkey & Black Bean Taco Bowls","day":"Thursday","date":"3/26","label":"Meal C","icon":"🌮","meta":"~30 min · Serves 4 · Build-your-own","ings":["1 lb ground turkey (93% lean)","1 small onion, diced","3 garlic cloves, minced","1 tablespoon olive oil","1 tsp ground cumin","1 tsp chili powder (mild)","½ tsp garlic powder","½ tsp smoked paprika","Salt and pepper to taste","1 (15-oz) can black beans, drained and rinsed","1 avocado, sliced","1 cup cherry tomatoes, halved","1–2 limes, cut into wedges","Fresh cilantro","Shredded Mexican cheese blend","Sour cream","Cooked white rice for serving (leftover from Wednesday works great)"],"steps":["Reheat leftover rice from Wednesday (or cook fresh: 1½ cups rice + 3 cups water).","Heat olive oil in a large skillet over medium-high heat. Add onion and cook 3–4 minutes until softened. Add garlic and cook 30 seconds.","Add ground turkey, breaking it up with a spatula. Cook 6–8 minutes until cooked through with no pink.","Stir in cumin, chili powder, garlic powder, paprika, salt, and pepper. Add black beans and toss to warm through, about 2 minutes.","Build the bowls: rice first, then the turkey-bean mixture. Top with avocado slices, halved cherry tomatoes, cheese, and sour cream.","Squeeze lime generously over each bowl. Scatter fresh cilantro on top. Let everyone build their own — kids can customize."],"note":"💡 This makes great leftovers for lunch Friday. Double the turkey-bean mix if you want extra. Mild as written — totally kid-friendly."}]},{"weekOf":"2026-03-19","title":"Week of March 16","meals":[{"id":"sheet-pan-lemon-herb-salmon","name":"Sheet Pan Lemon Herb Salmon & Veggies","day":"Tuesday","date":"3/17","label":"Meal A","icon":"🐟","meta":"~35 min · One pan · Serves 4–6","ings":["4–6 salmon fillets (~6 oz each), skinless","2 tbsp olive oil + 1 tsp for veggies","4 tbsp fresh lemon juice, divided","1 tsp garlic powder","1 tsp dried dill or parsley","1 tsp salt, ¾ tsp black pepper","2 cups broccoli florets","1 pint cherry tomatoes","2 medium zucchini, sliced","Lemon wedges to serve"],"steps":["Preheat oven to 425°F. Line a large rimmed baking sheet with parchment paper.","Toss broccoli, cherry tomatoes, and zucchini with olive oil and ½ tsp salt. Spread in a single layer. Roast 12 minutes.","While veggies roast, pat salmon dry. Whisk together olive oil, 2 tbsp lemon juice, garlic powder, dill, salt, and pepper.","Pull sheet from oven. Push veggies to the sides. Nestle salmon in center skin-side down. Brush with herb mixture. Squeeze remaining lemon over top.","Return to oven. Bake 12–15 minutes until salmon flakes easily and tomatoes are bursting. Internal temp 145°F.","Serve with extra lemon wedges. Optional: scatter fresh dill or parsley on top."],"note":"💡 The tomatoes get jammy and sweet at high heat — kids love them."},{"id":"chicken-tikka-masala-cauliflower","name":"Chicken Tikka Masala + Cauliflower","day":"Wednesday","date":"3/18","label":"Meal B","icon":"🍗","meta":"~45 min (marinate tonight!) · Serves 4–6","ings":["1 cup full-fat Greek yogurt","2 tbsp fresh lemon juice","1½ tsp ground cumin, 1 tsp garam masala","¼–½ tsp chili powder (skip for kids), 1 tsp salt","2 tsp grated fresh ginger, 2 tsp minced garlic","1.5 lbs chicken breast, bite-sized","2 tbsp oil + 2 tbsp butter","1 large sweet onion, finely diced","2 tsp brown sugar","1 tsp each: coriander, cumin, smoked paprika, garam masala","2 cans (8 oz each) unseasoned tomato sauce","1½ cups heavy cream","1 head cauliflower, cut into florets","Basmati rice, naan, fresh cilantro"],"steps":["Marinate (tonight!): Whisk marinade ingredients. Toss chicken to coat. Cover and refrigerate — at least 15 min, overnight is best.","Roast cauliflower: Preheat oven to 425°F. Toss cauliflower with olive oil, salt, pepper. Roast 20–25 min until golden and slightly charred. Set aside.","Sear chicken: Heat oil in a large skillet over medium-high. Add chicken in batches, don't crowd. Let sit 1 min untouched to crust, then sauté ~5 min until browned. Discard marinade. Set aside.","Build sauce: Melt butter in same pan. Sauté onion ~3 min. Add ginger + garlic, cook 30 sec. Add brown sugar and all spices, stir 15 sec until fragrant.","Pour in both cans of tomato sauce. Simmer 3–5 min until thickened.","Stir in cream. Return chicken and cauliflower to the pan. Simmer 8–10 min until cooked through and sauce is thick. Thin with water if needed.","Serve over basmati rice with naan. Garnish with cilantro. Adults can add hot sauce."],"note":"🧠 Bumped to 1½ cups cream + 2 cans tomato sauce for proper saucy consistency — especially with cauliflower soaking it up."},{"id":"pesto-chicken-tortellini-veggies","name":"Pesto Chicken Tortellini & Veggies","day":"Thursday","date":"3/19","label":"Meal C","icon":"🌿","meta":"~40 min · One pan · Serves 4","ings":["2 tbsp olive oil","1 lb chicken thighs, boneless/skinless, sliced into strips","Salt to taste","½ cup sun-dried tomatoes, drained and chopped (divided)","1 lb asparagus, ends trimmed, cut in half","¼ cup basil pesto (or more to taste)","1 cup cherry tomatoes, halved","1 cup refrigerated tortellini, uncooked"],"steps":["Heat olive oil over medium. Add chicken (seasoned with salt) and ¼ cup sun-dried tomatoes. Cook 5–10 min until chicken is cooked through. Remove, leaving oil in pan.","Add asparagus (seasoned with salt) and remaining sun-dried tomatoes. Cook 5–10 min until tender. Remove to a serving plate.","Cook tortellini per package directions. Drain.","Return chicken to skillet with pesto. Stir to coat and warm through over low-medium heat, 1–2 min.","Add tortellini and halved cherry tomatoes. Stir to combine. Add more pesto if desired. Plate alongside the asparagus."],"note":"💡 Fast, colorful, kids love tortellini. Add extra pesto at the end if it tastes flat."}]}];

// ── Firebase save state ───────────────────────────────────────────────────
var FB_SAVED = 'https://fox-bear-hub-default-rtdb.firebaseio.com/saved-recipes.json';
var savedIds = {};  // { mealId: true/false }

function loadSavedState(callback) {
  fetch(FB_SAVED)
    .then(function(r) { return r.json(); })
    .then(function(d) {
      savedIds = d || {};
      callback();
    })
    .catch(function() { callback(); }); // graceful degradation
}

function persistSavedState() {
  fetch(FB_SAVED, { method: 'PUT', body: JSON.stringify(savedIds) }).catch(function() {});
}

function isSaved(id) { return savedIds[id] === true; }

function toggleSave(id) {
  savedIds[id] = !isSaved(id);
  persistSavedState();
  refreshSaveUI(id);
  // Also refresh the badge on the journal card
  var badge = document.querySelector('.saved-badge[data-id="' + id + '"]');
  if (badge) badge.classList.toggle('visible', isSaved(id));
}

function refreshSaveUI(id) {
  var btn = document.getElementById('rd-save');
  var label = document.getElementById('rd-save-label');
  if (!btn || !label) return;
  var saved = isSaved(id);
  btn.classList.toggle('saved', saved);
  label.textContent = saved ? 'Saved' : 'Save';
  btn.setAttribute('aria-label', saved ? 'Remove from recipes' : 'Save to recipes');
}

// ── Render ────────────────────────────────────────────────────────────────
function renderWeek(week, isCurrent) {
  var entry = document.createElement('div');
  entry.className = 'week-entry';
  var mealCount = week.meals ? week.meals.length : 0;
  var label = isCurrent ? 'This Week' : 'Week of';
  entry.innerHTML =
    '<div class="week-header">' +
      '<span class="week-label">' + label + '</span>' +
      '<span class="week-title">' + (week.title || week.weekOf) + '</span>' +
      '<span class="week-count">' + mealCount + ' meal' + (mealCount !== 1 ? 's' : '') + '</span>' +
    '</div>' +
    (week.meals || []).map(function(meal, i) {
      var mealId = meal.id || meal.name.toLowerCase().replace(/[^a-z0-9]+/g, '-');
      return '<div class="meal-card" data-meal-json="' + encodeURIComponent(JSON.stringify(meal)) + '">' +
        '<div class="meal-card-header">' +
          '<div class="meal-icon">' + (meal.icon || '🍽') + '</div>' +
          '<div class="meal-info">' +
            '<div class="meal-label">' + (meal.label || ('Meal ' + String.fromCharCode(65+i))) + (meal.day ? ' · ' + meal.day + ' ' + (meal.date || '') : '') + '</div>' +
            '<div class="meal-name">' + meal.name + '</div>' +
            '<div class="meal-meta">' + (meal.meta || '') + '</div>' +
          '</div>' +
          '<span class="saved-badge" data-id="' + mealId + '">' +
            '<svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg>' +
            'Saved' +
          '</span>' +
          '<div class="card-chevron">›</div>' +
        '</div>' +
      '</div>';
    }).join('');

  entry.querySelectorAll('.meal-card').forEach(function(card) {
    card.addEventListener('click', function() {
      openDetail(JSON.parse(decodeURIComponent(card.dataset.mealJson)));
    });
  });

  return entry;
}

function applyBadges() {
  document.querySelectorAll('.saved-badge').forEach(function(badge) {
    badge.classList.toggle('visible', isSaved(badge.dataset.id));
  });
}

var totalWeeks = 1 + HISTORY.length;
document.getElementById('headerMeta').textContent = totalWeeks + ' week' + (totalWeeks !== 1 ? 's' : '') + ' logged';

var journal = document.getElementById('journal');
journal.appendChild(renderWeek(CURRENT_WEEK, true));
if (HISTORY.length === 0) {
  var empty = document.createElement('div');
  empty.className = 'empty-history';
  empty.innerHTML = '<strong>More weeks coming soon</strong>Past meals will appear here each time a new week is planned.';
  journal.appendChild(empty);
} else {
  HISTORY.forEach(function(week) { journal.appendChild(renderWeek(week, false)); });
}

// Load saved state from Firebase, then light up badges
loadSavedState(applyBadges);

// ── Recipe detail overlay ─────────────────────────────────────────────────
var curR = null;
var rdEl = document.getElementById('rd-overlay');

function openDetail(r) {
  curR = r;
  var mealId = r.id || r.name.toLowerCase().replace(/[^a-z0-9]+/g, '-');
  document.getElementById('rd-name').textContent = r.name;
  document.getElementById('rd-ings').innerHTML = (r.ings || []).map(function(i) { return '<li>' + i + '</li>'; }).join('');
  document.getElementById('rd-steps').innerHTML = (r.steps || []).map(function(s, n) { return '<li><span class="rd-step-num">' + (n+1) + '</span><span>' + s + '</span></li>'; }).join('');
  var rno = document.getElementById('rd-note');
  if (r.note) { rno.textContent = r.note; rno.style.display = ''; } else { rno.style.display = 'none'; }
  document.querySelector('.rd-body').scrollTop = 0;

  // Wire up save button for this specific recipe
  var saveBtn = document.getElementById('rd-save');
  saveBtn.onclick = function() { toggleSave(mealId); };
  refreshSaveUI(mealId);

  rdEl.classList.add('open');
  rdEl.setAttribute('aria-hidden', 'false');
  document.body.style.overflow = 'hidden';
}

function closeDetail() {
  rdEl.classList.remove('open');
  rdEl.setAttribute('aria-hidden', 'true');
  if (!document.getElementById('ck-overlay').classList.contains('open')) document.body.style.overflow = '';
}

document.getElementById('rd-back').addEventListener('click', closeDetail);
document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') {
    if (document.getElementById('ck-overlay').classList.contains('open')) { window.closeMode && window.closeMode(); }
    else if (rdEl.classList.contains('open')) { closeDetail(); }
  }
});

// ── Cooking mode ──────────────────────────────────────────────────────────
(function() {
  var ck=document.getElementById('ck-overlay'),track=document.getElementById('ck-track'),
    ingScroll=document.getElementById('ck-ing-scroll'),ingHead=document.getElementById('ck-ing-headline'),
    ingsList=document.getElementById('ck-ings'),stepVp=document.getElementById('ck-step-vp'),
    dotsEl=document.getElementById('ck-dots'),prevBtn=document.getElementById('ck-prev'),
    nextBtn=document.getElementById('ck-next'),closeX=document.getElementById('ck-x'),
    titleEl=document.getElementById('ck-title'),pip0=document.getElementById('ck-pip0'),
    pip1=document.getElementById('ck-pip1'),hintIng=document.getElementById('ck-hint-ing'),
    hintSteps=document.getElementById('ck-hint-steps');
  var recipe=null,stepIdx=0,isSteps=false,slides=[],dots=[],wakeLock=null,ingHid=false,stpHid=false;
  function lockOn(){if('wakeLock'in navigator){navigator.wakeLock.request('screen').then(function(l){wakeLock=l;}).catch(function(){});}}
  function lockOff(){if(wakeLock){wakeLock.release().catch(function(){});wakeLock=null;}}
  document.addEventListener('visibilitychange',function(){if(ck.classList.contains('open')&&document.visibilityState==='visible')lockOn();});
  function parseIng(s){var m=s.match(/^((?:[\d\u00bd\u2153\u2154\u00bc\u00be\s\/]+)\s*(?:cup|cups|tbsp|tsp|lb|lbs|oz|g|kg|ml|l|clove|cloves|medium|large|small|head|can|bunch|pinch|dash)?s?\.?)\s+([\s\S]+)/i);return m?{qty:m[1].trim(),name:m[2].trim()}:{qty:'\u2014',name:s};}
  function buildIngs(r){ingHead.textContent=r.name;titleEl.textContent=r.name;ingsList.innerHTML=(r.ings||[]).map(function(i){var p=parseIng(i);return'<li class="ck-ing-row"><span class="ck-qty">'+p.qty+'</span><span class="ck-item-name">'+p.name+'</span></li>';}).join('');ingScroll.scrollTop=0;}
  function buildSteps(r){slides.forEach(function(s){s.remove();});slides=[];dots=[];dotsEl.innerHTML='';stepVp.removeChild(hintSteps);(r.steps||[]).forEach(function(text,i){var sl=document.createElement('div');sl.className='ck-slide'+(i===0?' active':'');sl.innerHTML='<div class="ck-step-big">'+String(i+1).padStart(2,'0')+'</div><div class="ck-step-of">of '+r.steps.length+'</div><div class="ck-step-body">'+text+'</div>';stepVp.appendChild(sl);slides.push(sl);var d=document.createElement('div');d.className='ck-dot'+(i===0?' on':'');dotsEl.appendChild(d);dots.push(d);});stepVp.appendChild(hintSteps);stepIdx=0;refreshNav();}
  function goStep(n){if(n<0||n>=recipe.steps.length||n===stepIdx)return;var fwd=n>stepIdx,from=slides[stepIdx],to=slides[n];from.classList.remove('active');from.classList.add(fwd?'exit-up':'exit-down');to.style.transition='none';to.style.opacity='0';to.style.transform=fwd?'translateY(48px)':'translateY(-48px)';requestAnimationFrame(function(){requestAnimationFrame(function(){to.style.transition='';to.style.opacity='';to.style.transform='';to.classList.add('active');});});setTimeout(function(){from.classList.remove('exit-up','exit-down');},320);dots[stepIdx].classList.remove('on');dots[stepIdx].classList.toggle('done',fwd);dots[n].classList.remove('done');dots[n].classList.add('on');stepIdx=n;refreshNav();hideStepHint();}
  function refreshNav(){prevBtn.disabled=stepIdx===0;nextBtn.disabled=!recipe||stepIdx===recipe.steps.length-1;}
  function showPanel(p){isSteps=p==='steps';track.classList.toggle('flipped',isSteps);pip0.classList.toggle('on',!isSteps);pip1.classList.toggle('on',isSteps);if(isSteps)hideIngHint();}
  function hideIngHint(){if(!ingHid){ingHid=true;hintIng.classList.add('gone');}}
  function hideStepHint(){if(!stpHid){stpHid=true;hintSteps.classList.add('gone');}}
  var t0=null;
  ck.addEventListener('touchstart',function(e){var t=e.touches[0];t0={x:t.clientX,y:t.clientY,ms:Date.now()};},{passive:true});
  ck.addEventListener('touchend',function(e){if(!t0)return;var t=e.changedTouches[0],dx=t.clientX-t0.x,dy=t.clientY-t0.y,ms=Date.now()-t0.ms;t0=null;var D=44;if(Math.max(Math.abs(dx),Math.abs(dy))<D||ms>700)return;if(Math.abs(dx)>Math.abs(dy)){if(dx<-D&&!isSteps)showPanel('steps');if(dx>D&&isSteps)showPanel('ingredients');}else{if(isSteps){if(dy<-D)goStep(stepIdx+1);if(dy>D)goStep(stepIdx-1);}}},{passive:true});
  document.addEventListener('keydown',function(e){if(!ck.classList.contains('open'))return;if(isSteps){if(e.key==='ArrowDown'||e.key==='ArrowRight')goStep(stepIdx+1);if(e.key==='ArrowUp'||e.key==='ArrowLeft')goStep(stepIdx-1);}else{if(e.key==='ArrowRight')showPanel('steps');}});

  closeX.addEventListener('click',window.closeMode);

  document.getElementById('rd-cook').addEventListener('click',function(){if(curR)window.openMode(curR);});

</script>
