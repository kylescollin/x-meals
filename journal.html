<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Journal — Fox &amp; Bear Kitchen</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root{--cream:#faf7f2;--ink:#1a1a1a;--muted:#7a7264;--accent:#c8622a;--accent-light:#f5e8de;--border:#e4ded5;--check:#2d7a4f;--check-light:#e8f4ed;--ck-bg:#131311;--ck-dim:#252520;--ck-border:#2e2d28;--ck-text:#f0ebe0;--ck-muted:#6a6860;--ck-accent:#d4732e;--ck-done:#2d7a4f;}
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'DM Sans',sans-serif;background:var(--cream);color:var(--ink);min-height:100vh;-webkit-font-smoothing:antialiased;}
  .header{max-width:680px;margin:0 auto 36px;border-bottom:1px solid var(--border);padding:28px 20px 24px;}
  .header-eyebrow{font-weight:500;font-size:11px;letter-spacing:2.5px;text-transform:uppercase;color:var(--accent);margin-bottom:10px;}
  h1{font-family:'Playfair Display',serif;font-size:36px;font-weight:700;line-height:1.1;margin-bottom:8px;}
  .header-meta{font-size:13px;color:var(--muted);font-weight:300;}
  .journal{max-width:680px;margin:0 auto;padding:0 20px 60px;display:flex;flex-direction:column;gap:40px;}
  .week-entry{display:flex;flex-direction:column;gap:12px;}
  .week-header{display:flex;align-items:baseline;gap:12px;padding-bottom:12px;border-bottom:1px solid var(--border);}
  .week-label{font-size:10px;font-weight:500;letter-spacing:2px;text-transform:uppercase;color:var(--accent);flex-shrink:0;}
  .week-title{font-family:'Playfair Display',serif;font-size:18px;font-weight:500;flex:1;}
  .week-count{font-size:12px;color:var(--muted);font-weight:300;flex-shrink:0;}
</style>
</head>
<body>
<script src="nav.js"></script>
<div class="header">
  <div class="header-eyebrow">Fox &amp; Bear Kitchen</div>
  <h1>Journal</h1>
  <div class="header-meta" id="headerMeta"></div>
</div>
<div class="journal" id="journal"></div>

<script src="recipe-card.js"></script>
<script type="module">
import { requireAuth, getAuthToken, signOut } from './auth.js';
window.getToken  = getAuthToken;
window.doSignOut = signOut;
await requireAuth();

function renderWeek(week,isCurrent){var entry=document.createElement('div');entry.className='week-entry';var mealCount=week.meals?week.meals.length:0;var labelText=isCurrent?'This Week':'Week of';var header=document.createElement('div');header.className='week-header';header.innerHTML='<span class="week-label">'+labelText+'</span><span class="week-title">'+(week.title||week.weekOf)+'</span><span class="week-count">'+mealCount+' meal'+(mealCount!==1?'s':'')+'</span>';entry.appendChild(header);(week.meals||[]).forEach(function(meal,i){var mealLabel=(meal.label||('Meal '+String.fromCharCode(65+i)))+(meal.day?' · '+meal.day+' '+(meal.date||''):'');entry.appendChild(RecipeCard.makeCard(meal,mealLabel));});return entry;}

var FB_BASE='https://fox-bear-hub-default-rtdb.firebaseio.com';
var token=await getAuthToken();
var results=await Promise.all([
  fetch('data/recipes.json').then(function(r){return r.json();}).catch(function(){return {};}),
  fetch(FB_BASE+'/meals/current.json?auth='+token).then(function(r){return r.json();}),
  fetch(FB_BASE+'/meals/history.json?auth='+token).then(function(r){return r.json();}).catch(function(){return null;})
]);
var CORE_IDS={};
(results[0].recipes||[]).forEach(function(r){CORE_IDS[r.id]=true;});
RecipeCard.init({coreIds:CORE_IDS,onSaveChange:function(){RecipeCard.applyBadges();},onReady:function(){RecipeCard.applyBadges();}});
var weekData=results[1];
var histObj=results[2];
var histData=histObj?Object.values(histObj).sort(function(a,b){return b.weekOf.localeCompare(a.weekOf);}):[];

var totalWeeks=1+histData.length;
document.getElementById('headerMeta').textContent=totalWeeks+' week'+(totalWeeks!==1?'s':'')+' logged';
var journal=document.getElementById('journal');
journal.appendChild(renderWeek(weekData,true));
histData.forEach(function(week){journal.appendChild(renderWeek(week,false));});
</script>
</body>
</html>
