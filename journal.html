<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Journal — Fox &amp; Bear Kitchen</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root{--cream:#faf7f2;--ink:#1a1a1a;--muted:#7a7264;--accent:#c8622a;--accent-light:#f5e8de;--border:#e4ded5;--check:#2d7a4f;--check-light:#e8f4ed;--ck-bg:#131311;--ck-dim:#252520;--ck-border:#2e2d28;--ck-text:#f0ebe0;--ck-muted:#6a6860;--ck-accent:#d4732e;--ck-done:#2d7a4f;}
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'DM Sans',sans-serif;background:var(--cream);color:var(--ink);min-height:100vh;-webkit-font-smoothing:antialiased;}
  .header{max-width:680px;margin:0 auto 36px;border-bottom:1px solid var(--border);padding:28px 20px 24px;}
  .header-eyebrow{font-weight:500;font-size:11px;letter-spacing:2.5px;text-transform:uppercase;color:var(--accent);margin-bottom:10px;}
  h1{font-family:'Playfair Display',serif;font-size:36px;font-weight:700;line-height:1.1;margin-bottom:8px;}
  .header-meta{font-size:13px;color:var(--muted);font-weight:300;}
  .journal{max-width:680px;margin:0 auto;padding:0 20px 60px;display:flex;flex-direction:column;gap:40px;}
  .week-entry{display:flex;flex-direction:column;gap:12px;}
  .week-header{display:flex;align-items:baseline;gap:12px;padding-bottom:12px;border-bottom:1px solid var(--border);}
  .week-label{font-size:10px;font-weight:500;letter-spacing:2px;text-transform:uppercase;color:var(--accent);flex-shrink:0;}
  .week-title{font-family:'Playfair Display',serif;font-size:18px;font-weight:500;flex:1;}
  .week-count{font-size:12px;color:var(--muted);font-weight:300;flex-shrink:0;}
  .empty-history{text-align:center;padding:40px 20px;color:var(--muted);font-size:14px;font-weight:300;line-height:1.6;border:1px dashed var(--border);border-radius:10px;}
  .empty-history strong{display:block;font-family:'Playfair Display',serif;font-size:16px;font-weight:500;color:var(--ink);margin-bottom:6px;}
</style>
</head>
<body>
<script src="nav.js"></script>
<div class="header">
  <div class="header-eyebrow">Fox &amp; Bear Kitchen</div>
  <h1>Journal</h1>
  <div class="header-meta" id="headerMeta"></div>
</div>
<div class="journal" id="journal"></div>

<script src="recipe-card.js"></script>
<script>
var CURRENT_WEEK = {"weekOf":"2026-04-13","title":"Week of April 13","meals":[{"id":"sheet-pan-beef-broccoli","label":"Meal A","day":"Tuesday","date":"4/14","icon":"🥩","name":"Sheet Pan Beef & Broccoli","meta":"~30 min · Sheet pan · Serves 4","ings":["1½ lb flank steak or sirloin, sliced thin against the grain","4 cups broccoli florets","3 cloves garlic, minced","¼ cup low-sodium soy sauce","2 tbsp oyster sauce","1 tbsp sesame oil","1 tbsp honey","½ tsp ground ginger","2 tbsp cornstarch","2 tbsp vegetable oil","1½ cups jasmine rice","Sesame seeds + sliced green onions for garnish"],"steps":["Preheat oven to 425°F. Start rice on stovetop: 1½ cups rice + 3 cups water, bring to boil, reduce to low, cover, 18 min.","Slice beef very thin against the grain. Whisk together soy sauce, oyster sauce, sesame oil, honey, ginger, garlic, and cornstarch into a marinade. Toss beef in half the marinade and set aside 10 minutes.","Toss broccoli florets with vegetable oil, salt, and pepper on a large sheet pan. Roast 8 minutes.","Push broccoli to the sides. Spread marinated beef in a single layer in the center. Roast everything 8–10 more minutes until beef is cooked through and broccoli is lightly charred.","Warm remaining marinade in a small saucepan over medium heat, adding a splash of water to thin slightly, until it simmers and thickens into a glossy sauce.","Serve beef and broccoli over rice. Drizzle with extra sauce. Garnish with sesame seeds and green onions."],"note":"💡 Slice the beef as thin as possible — even partially frozen beef is easier to slice thin. The marinade does double duty as the finishing sauce."},{"id":"black-bean-sweet-potato-enchiladas","label":"Meal B","day":"Wednesday","date":"4/15","icon":"🫘","name":"Black Bean & Sweet Potato Enchiladas","meta":"~40 min · Baked · Vegetarian · Serves 4","ings":["2 large sweet potatoes, peeled and diced small","1 can (15 oz) black beans, drained and rinsed","½ cup frozen corn","1 small onion, diced","3 cloves garlic, minced","1 tsp cumin","1 tsp chili powder","½ tsp smoked paprika","½ tsp garlic powder","Salt and pepper to taste","8 small corn tortillas","1 can (10 oz) mild red enchilada sauce","2 cups shredded Mexican cheese blend","Olive oil for roasting","Sour cream and cilantro for serving (optional)"],"steps":["Preheat oven to 400°F. Toss diced sweet potato with olive oil, cumin, chili powder, smoked paprika, salt, and pepper. Spread on a baking sheet. Roast 20 minutes, flipping once, until tender and lightly caramelized.","Sauté onion in a skillet with olive oil over medium heat until soft, 4–5 minutes. Add garlic and cook 30 seconds. Stir in black beans and corn; warm through. Season with salt and pepper.","Combine roasted sweet potato with the bean mixture in a large bowl.","Warm tortillas briefly in a dry skillet or microwave (30 sec) so they roll without cracking. Spoon about ⅓ cup filling into each tortilla, roll tightly, and place seam-side down in a greased 9x13 baking dish.","Pour enchilada sauce evenly over the top. Sprinkle cheese all over.","Bake 20 minutes until cheese is melted and bubbling. Serve with sour cream and fresh cilantro."],"note":"💡 Warming the tortillas is the key step — cold corn tortillas crack when rolled. The kids will love the cheese pull."},{"id":"lemon-herb-chicken-meatballs-orzo","label":"Meal C","day":"Thursday","date":"4/16","icon":"🍋","name":"Lemon Herb Chicken Meatballs with Orzo","meta":"~35 min · One pan · Serves 4","ings":["1 lb ground chicken","¼ cup breadcrumbs (plain or panko)","1 egg","¼ cup grated Parmesan","2 tbsp fresh parsley, chopped","1 tsp dried oregano","Zest of 1 lemon","3 cloves garlic, minced (divided)","Salt and black pepper","2 tbsp olive oil","1 small onion, finely diced","¼ cup white wine or extra chicken broth","2½ cups chicken broth","1½ cups orzo","Juice of 1 lemon","½ cup heavy cream","2 cups fresh baby spinach","Extra Parmesan to finish"],"steps":["Mix ground chicken, breadcrumbs, egg, Parmesan, parsley, oregano, lemon zest, half the garlic, salt, and pepper until just combined. Roll into 16–18 small meatballs (~1.5 inch).","Heat olive oil in a large deep skillet over medium-high. Sear meatballs in batches, turning to brown on 2–3 sides, about 4–5 minutes. Remove and set aside — they'll finish cooking in the sauce.","In the same pan, sauté onion over medium heat until soft, 3–4 minutes. Add remaining garlic and cook 30 seconds. Deglaze with white wine, scraping up any browned bits.","Pour in chicken broth and bring to a simmer. Stir in orzo and cook 7–8 minutes, stirring often, until orzo is almost tender and most broth is absorbed.","Stir in lemon juice and heavy cream. Nestle meatballs back into the pan. Cook 4–5 more minutes until meatballs are cooked through (165°F) and orzo is perfectly al dente.","Add spinach and stir until just wilted. Taste and adjust salt. Finish with extra Parmesan and a little more lemon if desired."],"note":"💡 Stir the orzo frequently so it doesn't stick. The lemon + cream combo makes a bright, light sauce. Kids love the little meatballs."}]};

var HISTORY = [{"weekOf":"2026-04-06","title":"Week of April 6","meals":[{"id":"creamy-sausage-and-peppers-pasta","label":"Meal D","day":"Sunday","date":"4/5","icon":"🍝","name":"Creamy Sausage and Peppers Pasta","meta":"~40 min · One pan · Serves 4","ings":["8 oz uncooked pasta (bucatini works great)","1 lb Italian sausage (ground or removed from casings)","1 tbsp olive oil","½ medium onion, chopped","1 medium red bell pepper, chopped","1 medium yellow bell pepper, chopped","1 tbsp butter","2–3 cloves garlic, minced","1 tsp flour","1 cup heavy/whipping cream","½ tsp Dijon mustard","2 cups fresh baby spinach (packed)","Salt & pepper to taste","Freshly grated Parmesan cheese"],"steps":["Boil a large salted pot of water and cook pasta al dente per package directions.","Brown sausage in a skillet over medium-high heat, breaking it up as you go (8–10 minutes). Transfer to a paper towel-lined plate.","Add oil to the skillet with onion and both bell peppers. Cook until lightly browned and softened, about 7–8 minutes.","Reduce heat to medium. Add butter and garlic; once butter melts, sprinkle in flour and cook 1 minute, stirring well.","Stir in cream and Dijon mustard. Sauce should thicken quickly — don't cook more than a minute before next step.","Add cooked sausage and spinach to the skillet and stir to combine.","Splash in a couple tablespoons of pasta water, then drain pasta and add to the skillet. Toss until spinach wilts and pasta is coated. Serve immediately with Parmesan."],"note":"Use ground sausage or buy links and remove the meat from casings."},{"id":"sausage-white-bean-soup","label":"Meal A","day":"Monday","date":"4/6","icon":"🍲","name":"Sausage White Bean Soup","meta":"~35 min · One pot · Serves 4–6","ings":["1 lb mild Italian sausage, crumbled","1 tbsp olive oil","1 medium onion, diced","3 cloves garlic, minced","2 carrots, peeled and sliced","2 stalks celery, chopped","1 can (15 oz) white beans, drained and rinsed","4 cups chicken broth","1 tsp dried thyme","1 tsp dried rosemary","Salt and pepper to taste","Fresh parsley for garnish"],"steps":["Heat olive oil in a large pot over medium heat. Brown sausage, breaking it apart. Remove and set aside.","In the same pot, cook onion, garlic, carrots, and celery until softened, about 5–7 minutes.","Return sausage to pot. Add white beans, broth, thyme, rosemary, salt, and pepper. Stir and bring to a simmer.","Cover and simmer on low 20–25 minutes. Serve garnished with fresh parsley."],"note":"Mash some of the beans before adding for a creamier texture."},{"id":"air-fryer-fish-tacos","label":"Meal B","day":"Tuesday","date":"4/7","icon":"🌮","name":"Air Fryer Fish Tacos with Cilantro Lime Slaw","meta":"~20 min · Air fryer · Serves 4","ings":["1½ lb tilapia or white fish (mahi mahi, cod, etc.)","Fish rub: 1 tsp chili powder, ½ tsp each oregano/garlic powder/paprika, ¼ tsp each onion powder/cumin, salt & pepper","Cilantro lime slaw: 2½ cups coleslaw mix, 3 tbsp mayo, 1 tbsp lime juice, 1 garlic clove minced, ⅓ cup chopped cilantro, ¼ tsp each salt & pepper","Tortillas for serving"],"steps":["Spray the air fryer basket with oil. Mix the spices together.","Pat fish dry and lay in the air fryer basket. Brush with olive oil, coat generously with spice rub, and spritz with oil.","Preheat air fryer to 400°F. Cook fish 8–10 minutes until opaque and flaking (internal temp 145°F).","While fish cooks, toss together the cilantro lime slaw. Adjust salt and lime to taste.","Remove fish, cut into pieces, and serve in tortillas topped with slaw and extra lime."],"note":"No air fryer? Bake at 400°F for about 15 minutes. Do not flip fish in the air fryer — it may fall apart."},{"id":"miso-glazed-salmon-bowls","label":"Meal C","day":"Wednesday","date":"4/8","icon":"🐟","name":"Miso Glazed Salmon Bowls","meta":"~30 min · Sheet pan + rice · Serves 4","ings":["4 salmon fillets (~6 oz each), skinless","3 tbsp white miso paste","2 tbsp low-sodium soy sauce","2 tbsp honey or maple syrup","1 tbsp rice vinegar","1 tsp toasted sesame oil","1 tsp fresh ginger, grated","2 cloves garlic, minced","1½ cups jasmine rice","1 large English cucumber, thinly sliced","1 cup shredded carrots","1 cup shelled edamame (thawed)","2–3 green onions, sliced","1 tbsp sesame seeds"],"steps":["Cook jasmine rice per package instructions.","Whisk together miso paste, soy sauce, honey, rice vinegar, sesame oil, ginger, and garlic to make the glaze.","Pat salmon dry. Place on a foil-lined baking sheet. Spoon half the glaze over each fillet.","Broil at 400°F for 12–15 minutes, basting with remaining glaze halfway through, until salmon flakes easily.","Assemble bowls: rice base topped with salmon, cucumber, carrots, and edamame. Drizzle with any remaining glaze.","Garnish with sliced green onions and sesame seeds."],"note":"Leftovers keep well — store components separately and assemble fresh."}]},{"weekOf":"2026-03-29","title":"Week of March 29","meals":[{"id":"chicken-pineapple-fried-rice","name":"Chicken Pineapple Fried Rice","day":"Tuesday","date":"3/31","label":"Meal A","icon":"🍚","meta":"~30 min · Wok or skillet · Serves 4","ings":["3 cups cooked jasmine rice, cold","½ lb boneless skinless chicken thighs, sliced thin","1 cup frozen mixed vegetables","1 cup pineapple, diced","½ cup onion, finely diced","2 cloves garlic, minced","2 tablespoons vegetable oil","1½ tablespoons soy sauce","1 teaspoon fish sauce","¼ tsp salt, ¼ tsp black pepper","Green onions, sesame seeds (garnish)","Marinade: 2 tsp soy sauce + 2 tsp sesame oil + 1 tsp cornstarch + ¼ tsp baking soda"],"steps":["Cook rice ahead of time and refrigerate overnight.","Slice chicken and toss with marinade. Let sit 10–15 minutes.","Break up cold rice into individual grains.","Fry chicken in oil until cooked through. Remove and set aside.","Sauté garlic and onion, add vegetables and pineapple, cook 3–4 minutes.","Push to side, add rice, toss everything with soy and fish sauce. Stir-fry 2–3 minutes.","Add chicken back, toss and serve hot with green onions and sesame seeds."],"note":"💡 Pre-cook the rice — cold rice is essential for good fried rice."},{"id":"greek-chicken-bowls","name":"Greek Chicken Bowls with Tzatziki","day":"Wednesday","date":"4/1","label":"Meal B","icon":"🥙","meta":"~35 min · Bowls · Serves 4","ings":["1½ lb boneless skinless chicken thighs","Lemon-oregano marinade","1 English cucumber","1 cup plain Greek yogurt","1 cup cherry tomatoes","½ small red onion","1½ cups jasmine rice","½ cup hummus","Feta cheese, fresh parsley"],"steps":["Marinate chicken in olive oil, lemon, garlic, oregano.","Make tzatziki: grated cucumber + yogurt + garlic + dill.","Cook rice. Make cucumber salad.","Cook chicken until golden, rest and slice.","Build bowls: rice, chicken, hummus, cucumber salad, tzatziki, feta."],"note":"💡 Marinate the chicken the night before."},{"id":"asian-turkey-lettuce-wraps","name":"Asian Turkey Lettuce Wraps","day":"Thursday","date":"4/2","label":"Meal C","icon":"🥬","meta":"~25 min · Skillet · Serves 4","ings":["1 lb ground turkey","Hoisin, soy sauce, rice vinegar, sesame oil","Water chestnuts","Butter lettuce","Green onions, sesame seeds"],"steps":["Whisk together hoisin, soy, rice vinegar, sesame oil.","Sauté garlic and ginger, add turkey and cook through.","Add water chestnuts and sauce, cook 2 minutes.","Serve in lettuce cups with garnishes."],"note":"💡 Let kids build their own lettuce tacos."}]},{"weekOf":"2026-03-22","title":"Week of March 22","meals":[{"id":"shakshuka","name":"Shakshuka","day":"Tuesday","date":"3/24","label":"Meal A","icon":"🍳","meta":"~30 min · One pan · Vegetarian · Serves 4–6","ings":["2 tbsp olive oil","1 medium onion, diced","1 red bell pepper, diced","4 garlic cloves","2 tsp paprika, 1 tsp cumin, ¼ tsp chili powder","1 (28-oz) can whole peeled tomatoes","6 large eggs","Cilantro, parsley, feta, pita"],"steps":["Sauté onion and bell pepper 5 minutes.","Add garlic and spices, cook 1 minute.","Add tomatoes, break down, simmer 5 minutes.","Make 6 wells, crack eggs in each.","Cook 5–8 minutes until eggs set. Garnish and serve."]},{"id":"lemon-herb-baked-cod","name":"Lemon Herb Baked Cod with Asparagus & Rice","day":"Wednesday","date":"3/25","label":"Meal B","icon":"🐠","meta":"~35 min · Sheet pan · Serves 4","ings":["4 cod fillets","Lemon, olive oil, garlic powder, thyme","1 lb asparagus","White rice"],"steps":["Preheat 400°F. Start rice.","Roast asparagus 8 min.","Make herb-lemon mixture, coat cod.","Add cod to pan, bake 12–15 min.","Serve over rice."]},{"id":"turkey-black-bean-taco-bowls","name":"Turkey & Black Bean Taco Bowls","day":"Thursday","date":"3/26","label":"Meal C","icon":"🌮","meta":"~30 min · Serves 4","ings":["1 lb ground turkey","Black beans, taco seasoning","Avocado, cherry tomatoes, lime, cilantro","Rice, cheese, sour cream"],"steps":["Cook rice.","Brown turkey with onion and garlic.","Add taco spices and black beans.","Build bowls with all toppings."],"note":"💡 Great leftovers."}]},{"weekOf":"2026-03-19","title":"Week of March 16","meals":[{"id":"sheet-pan-lemon-herb-salmon","name":"Sheet Pan Lemon Herb Salmon & Veggies","day":"Tuesday","date":"3/17","label":"Meal A","icon":"🐟","meta":"~35 min · One pan · Serves 4–6","ings":["4–6 salmon fillets","Lemon, olive oil, garlic powder, dill","Broccoli, cherry tomatoes, zucchini"],"steps":["Preheat 425°F. Roast veggies 12 min.","Add salmon with herb-lemon mixture.","Bake 12–15 min.","Serve with lemon wedges."]},{"id":"chicken-tikka-masala-cauliflower","name":"Chicken Tikka Masala + Cauliflower","day":"Wednesday","date":"3/18","label":"Meal B","icon":"🍗","meta":"~45 min · Serves 4–6","ings":["1.5 lbs chicken breast, marinated in yogurt-spice mixture","1 head cauliflower","Tomato sauce, heavy cream, basmati rice, naan"],"steps":["Marinate chicken overnight.","Roast cauliflower at 425°F.","Sear chicken, build sauce with onion/ginger/garlic/spices.","Add tomato sauce and cream, return chicken and cauliflower.","Simmer until thick. Serve over rice with naan."]},{"id":"pesto-chicken-tortellini-veggies","name":"Pesto Chicken Tortellini & Veggies","day":"Thursday","date":"3/19","label":"Meal C","icon":"🌿","meta":"~40 min · One pan · Serves 4","ings":["1 lb chicken thighs","Sun-dried tomatoes, asparagus","Basil pesto, cherry tomatoes","1 cup refrigerated tortellini"],"steps":["Cook chicken with sun-dried tomatoes.","Cook asparagus separately.","Cook tortellini, drain.","Toss chicken with pesto, add tortellini and tomatoes.","Plate with asparagus."]}]}];

var CORE_IDS = {"slow-cooker-chili":true,"creamy-sausage-and-peppers-pasta":true,"zucchini-tomato-italian-sausage-soup":true,"vegetarian-quesadillas":true,"creamy-chorizo-gnocchi":true,"easy-weeknight-salmon-sushi-bowls":true,"butternut-squash-ravioli-with-brown-butter-sage":true,"creamy-chicken-tortilla-soup":true,"lentil-soup-with-sausage-chard-and-garlic":true,"best-lasagna":true,"italian-meat-sauce":true,"vegetarian-grain-bowl-meal-prep":true,"air-fryer-fish-tacos-with-cilantro-lime-slaw":true,"creamy-tomato-gnocchi-with-burrata":true,"white-chicken-chili":true,"teriyaki-chicken-tacos-with-sesame-cucumber-slaw":true,"sausage-white-bean-soup":true,"slow-cooker-chicken-pot-pie":true,"creamy-parmesan-sausage-ditalini-soup":true,"seared-salmon-with-lemon-orzo":true,"falafel-bowl-with-tahini-dressing":true,"one-pan-coconut-curry-salmon":true,"ground-turkey-teriyaki-stir-fry":true,"corn-chowder":true,"pesto-chicken-tortellini-and-veggies":true,"butter-cauliflower":true,"vegan-mushroom-bourguignon":true,"louisiana-red-beans-and-rice":true,"spicy-garlic-chicken-bowl-with-hummus":true,"lemon-chili-grilled-chicken-bowls-with-hummus":true,"homemade-crunchwrap-supreme":true,"chicken-pineapple-fried-rice":true,"easy-shrimp-alfredo":true,"creamy-spinach-and-mushroom-tortellini":true,"garlic-sesame-noodles":true,"shakshuka":true,"miso-glazed-salmon-bowls":true};

function renderWeek(week, isCurrent) {
  var entry = document.createElement('div');
  entry.className = 'week-entry';
  var mealCount = week.meals ? week.meals.length : 0;
  var labelText = isCurrent ? 'This Week' : 'Week of';
  var header = document.createElement('div');
  header.className = 'week-header';
  header.innerHTML = '<span class="week-label">' + labelText + '</span><span class="week-title">' + (week.title || week.weekOf) + '</span><span class="week-count">' + mealCount + ' meal' + (mealCount !== 1 ? 's' : '') + '</span>';
  entry.appendChild(header);
  (week.meals || []).forEach(function(meal, i) {
    var mealLabel = (meal.label || ('Meal ' + String.fromCharCode(65 + i))) + (meal.day ? ' · ' + meal.day + ' ' + (meal.date || '') : '');
    entry.appendChild(RecipeCard.makeCard(meal, mealLabel));
  });
  return entry;
}

window.addEventListener('load', function() {
  RecipeCard.init({
    coreIds: CORE_IDS,
    onSaveChange: function() { RecipeCard.applyBadges(); },
    onReady: function() { RecipeCard.applyBadges(); }
  });
  var totalWeeks = 1 + HISTORY.length;
  document.getElementById('headerMeta').textContent = totalWeeks + ' week' + (totalWeeks !== 1 ? 's' : '') + ' logged';
  var journal = document.getElementById('journal');
  journal.appendChild(renderWeek(CURRENT_WEEK, true));
  if (HISTORY.length === 0) {
    var empty = document.createElement('div');
    empty.className = 'empty-history';
    empty.innerHTML = '<strong>More weeks coming soon</strong>Past meals will appear here each time a new week is planned.';
    journal.appendChild(empty);
  } else {
    HISTORY.forEach(function(week) { journal.appendChild(renderWeek(week, false)); });
  }
});
</script>
</body>
</html>
