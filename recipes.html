<script>
var RECIPES = [
  {id:"slow-cooker-chili",icon:"🌶️",label:"Soup · 6 hrs",name:"Slow Cooker Chili",meta:"6 hrs 15 min · Slow Cooker · Serves 8",ings:["1 Tbsp olive oil","2 lbs lean ground beef","1 large yellow onion, finely chopped","3 cloves garlic, finely minced","2 (14.5 oz) cans diced tomatoes with green chilies","3 (8 oz) cans tomato sauce","½ cup beef broth","2 Tbsp chili powder","2½ tsp ground cumin","2 tsp paprika","2 tsp unsweetened cocoa powder","1 tsp granulated sugar","½ tsp ground coriander","Salt and freshly ground black pepper","1 (15 oz) can dark red kidney beans, drained","1 (15 oz) can light red kidney beans, drained","Shredded cheddar cheese for serving"],steps:["Heat olive oil in a large skillet over medium-high. Sauté onion 3 min, add garlic 30 sec. Pour into slow cooker.","Return skillet to medium-high. Add beef and cook, stirring occasionally, until browned. Drain most fat.","Add beef to slow cooker. Stir in tomatoes, tomato sauce, broth, all spices, salt and pepper.","Cover and cook on low 5–6 hours.","Stir in kidney beans and heat through, about 2 min. Serve with desired toppings."],note:"💡 Look for tomatoes labeled \"mild\" green chilies. Bloom spices in the last minute for extra depth."},
  {id:"creamy-sausage-and-peppers-pasta",icon:"🍝",label:"Pasta · 40 min",name:"Creamy Sausage and Peppers Pasta",meta:"40 min · Stovetop · Serves 4",ings:["8 oz uncooked pasta (bucatini recommended)","1 lb Italian sausage","1 Tbsp olive oil","½ medium onion, chopped","1 medium red bell pepper, chopped","1 medium yellow bell pepper, chopped","1 Tbsp butter","2–3 cloves garlic, minced","1 tsp flour","1 cup heavy cream","½ tsp Dijon mustard","2 cups fresh baby spinach","Salt, pepper, freshly grated Parmesan to taste"],steps:["Boil salted pasta water and cook pasta al dente per package.","Brown sausage in skillet over medium-high, breaking it up, 8–10 min. Transfer to paper towel–lined plate.","Add oil, onion, and peppers to same skillet. Cook until onion is lightly browned, 7–8 min.","Reduce to medium. Add butter and garlic; once melted, sprinkle in flour and cook 1 min.","Stir in cream and Dijon — no lumps. Sauce thickens quickly; don't overcook.","Add sausage and spinach. Splash in pasta water, drain pasta, add to skillet. Toss until spinach wilts."],note:""},
  {id:"zucchini-tomato-italian-sausage-soup",icon:"🥣",label:"Soup · 35 min",name:"Zucchini Tomato Italian Sausage Soup",meta:"~35 min · Stovetop",ings:["Italian sausage","Zucchini","Tomatoes","Aromatics and broth"],steps:["Full recipe at eatwell101.com/zucchini-tomato-italian-sausage-soup-recipe"],note:""},
  {id:"vegetarian-quesadillas",icon:"🫓",label:"Veggie · 25 min",name:"Vegetarian Quesadillas",meta:"25 min · Stovetop · Serves 4",ings:["4 medium flour tortillas","1 large sweet potato","2 avocados","½ cup black beans, rinsed","¼ cup corn, rinsed","1 mini red pepper","1 mini orange pepper","1 tsp jalapeño, diced (optional)","1 Tbsp taco seasoning","1 cup cheddar or pepper jack cheese","1 Tbsp butter","2 tsp olive oil, divided","Cilantro, lime, salsa, sour cream to serve"],steps:["Poke holes in sweet potato, drizzle with oil, wrap in paper towels, microwave 8 min until very tender.","Dice peppers and jalapeño. Cook in pan until tender, 5–7 min. Add beans, corn, and taco seasoning. Cook 3 more min. Set aside.","Butter one side of tortilla. Spread sweet potato on the other, mash ½ avocado over it, add veggie filling, sprinkle cheese.","Cook butter-side down over medium heat until browned and cheese melts. Fold in half. Repeat. Slice and serve warm."],note:""},
  {id:"creamy-chorizo-gnocchi",icon:"🍝",label:"Pasta · 20 min",name:"Creamy Chorizo Gnocchi",meta:"20 min · Stovetop · Serves 4",ings:["500 g gnocchi","1 Tbsp olive oil","100 g chorizo, small pieces","1 medium shallot, diced","1 red bell pepper, diced","2 large garlic cloves, finely chopped","¼ tsp red chilli flakes","75 ml dry white wine","1 Tbsp tomato paste","100 g cream cheese","100 g baby spinach","30 g grated Parmesan","Salt and pepper"],steps:["Fry chorizo in olive oil over medium heat 2–3 min until slightly crunchy.","Add shallot and red pepper; cook 3 min until softened.","Meanwhile, boil salted water and cook gnocchi per package.","Add garlic and chilli flakes; cook 1 min. Pour in wine; cook 1 min. Stir in tomato paste.","Reserve ½ cup gnocchi water. Add cream cheese and gnocchi water; stir until smooth sauce forms.","Stir in spinach until wilted. Add gnocchi and toss. Stir in Parmesan, season, serve immediately."],note:""},
  {id:"easy-weeknight-salmon-sushi-bowls",icon:"🍣",label:"Bowl · 20 min",name:"Easy Weeknight Salmon Sushi Bowls",meta:"~20 min · Bowl · Serves 4",ings:["2½ cups sushi or jasmine rice","¼ cup rice vinegar","5 tsp granulated sugar","4 (4 oz) cooked salmon filets","1 cup sliced Persian cucumbers","1 cup shredded carrots","2 small ripe avocados, thinly sliced","1 Tbsp oil","⅓ cup panko breadcrumbs","Pinch of garlic salt","Sriracha mayo, toasted sesame seeds, 1 nori sheet, pickled ginger"],steps:["Cook rice in rice cooker. Combine vinegar, sugar, ½ tsp salt; microwave 20 sec, stir until dissolved. Pour over rice. Let sit.","Panko crunchies: heat oil in small skillet, toast panko ~2 min until golden.","Build bowls: ¾ cup rice, flaked salmon, ¼ cup each cucumbers and carrots, ½ avocado, ginger, panko. Top with nori and sesame seeds. Drizzle sriracha mayo.","Sriracha mayo: mix ½ cup mayo, 1 Tbsp sriracha, 1 tsp sugar, 1 tsp low-sodium soy sauce."],note:""},
  {id:"butternut-squash-ravioli-with-brown-butter-sage",icon:"🧈",label:"Pasta · 8 min",name:"Butternut Squash Ravioli with Brown Butter Sage",meta:"8 min · Stovetop · Serves 4",ings:["8–10 oz butternut squash ravioli","½ cup unsalted butter, cubed","15 fresh sage leaves","2 Tbsp heavy cream","½ tsp kosher salt","¼ tsp fresh cracked black pepper","Grated pecorino or Parmesan for serving"],steps:["Boil ravioli per package. Drain al dente; do not rinse.","Melt butter in skillet over medium, stirring until it bubbles, then froths. Add sage — it will fry in the butter. Cook until froth subsides and brown bits form. Remove from heat. Transfer sage to paper towel.","Return pan to medium-low. Whisk in cream. Simmer 1–2 min, add salt and pepper.","Add ravioli to sauce and toss. Serve with Parmesan and crispy sage."],note:"💡 Total butter browning time: 4–5 minutes. Watch carefully — it goes from golden to burnt quickly."},
  {id:"creamy-chicken-tortilla-soup",icon:"🍲",label:"Soup · 30 min",name:"Creamy Chicken Tortilla Soup",meta:"30 min · Stovetop · Serves 6",ings:["1 Tbsp olive oil","½ medium onion, chopped","1 (28 oz) can crushed tomatoes","1 (10 oz) can Rotel diced tomatoes with green chilies","1 cup chicken broth","1 tsp garlic powder","1 tsp smoked paprika","½ Tbsp chili powder","1 (12 oz) can corn, drained","1 (14 oz) can black beans, drained & rinsed","1 cup heavy cream","2 cups cooked shredded chicken","Tortilla strips, avocado, sour cream, Tex-Mex cheese"],steps:["Sauté onion in oil over medium-high 5–7 min until lightly browned.","Stir in tomatoes, Rotel, broth, spices, corn, and beans. Increase to high.","Boil, then reduce and simmer lid slightly ajar for 5 min.","Stir in cream and chicken. Warm through 3–5 min. Season and serve with toppings."],note:""},
  {id:"lentil-soup-with-sausage-chard-and-garlic",icon:"🥣",label:"Soup · 1 hr",name:"Lentil Soup with Sausage, Chard and Garlic",meta:"~1 hour · Stovetop · Serves 6",ings:["¼ cup olive oil, divided","4 large links (1 lb) sweet Italian sausage","1 medium onion, diced","3 celery stalks, diced","3 medium carrots, peeled and diced","4 cloves garlic, sliced (reserve half)","Kosher salt and red pepper flakes","2 cups brown lentils, sorted and rinsed","2 bay leaves","1 (28 oz) can crushed tomatoes","6 cups chicken broth","3–4 cups shredded Swiss chard or kale","Grated Pecorino Romano to finish"],steps:["Heat 2 Tbsp olive oil in large pot over medium-high. Add sausage, brown 5 min. Add onion, celery, carrots, 2 garlic cloves, salt, optional pepper flakes; cook 5 min.","Add lentils, bay leaves, tomatoes, broth, salt and pepper. Simmer until lentils are tender, ~40 min.","Add chard, cook until tender, a few minutes. Discard bay leaves.","In small skillet, heat remaining garlic in remaining olive oil until softened. Drizzle over bowls with Romano."],note:""},
  {id:"best-lasagna",icon:"🫕",label:"Pasta · 1 hr 55 min",name:"Best Lasagna",meta:"1 hr 55 min · Oven · Serves 12",ings:["1 lb dried lasagna noodles","1 lb ground beef (or turkey, or ½ beef ½ mild sausage)","1 medium yellow onion, finely chopped","4 garlic cloves, minced","¼ cup tomato paste","2 (28 oz) cans crushed tomatoes","1½ tsp kosher salt, ¾ tsp black pepper","1 tsp Italian seasoning, 2 tsp sugar","16 oz whole milk ricotta","1 large egg","1 cup grated Parmesan, plus extra","1 Tbsp dried parsley","6 cups grated mozzarella"],steps:["Preheat oven to 375°F. Boil salted water; cook noodles al dente ~8 min. Drain, rinse, separate.","Brown beef with onion and garlic over medium-high, ~8 min. Stir in tomato paste, 1 min. Add tomatoes, salt, pepper, seasoning, sugar. Simmer covered 15–20 min.","Mix ricotta, egg, ¾ cup Parmesan, remaining salt and pepper.","In 9×13 dish: 1 cup sauce, noodles, 1½ cups sauce, ¼ ricotta mix, 1¼ cups mozzarella. Repeat 3 more times. Top with remaining sauce, mozzarella, Parmesan.","Cover loosely with foil. Bake 30 min. Uncover, bake 20 more min. Rest 5–10 min before serving."],note:""},
  {id:"italian-meat-sauce",icon:"🍅",label:"Sauce · 75 min",name:"Italian Meat Sauce",meta:"75 min · Stovetop · Serves 12",ings:["¼ cup extra virgin olive oil","1 large sweet onion, diced","2 lbs 85% lean ground beef","4–6 cloves garlic, minced","2 tsp granulated garlic","2 tsp kosher salt, 1 tsp pepper","4 Tbsp tomato paste","1 (28 oz) can ground peeled tomatoes","1 (28 oz) can tomato puree","2 Tbsp finely chopped basil","2 tsp sugar"],steps:["Heat olive oil in heavy pot. Sauté onion until translucent, 5–8 min.","Add garlic; cook until fragrant.","Add beef; cook until browned. Drain excess fat if needed.","Add granulated garlic, salt, pepper. Stir in tomato paste; cook until it loses its bright red color.","Add tomatoes, puree, sugar, and basil. Bring to boil, then simmer ~1 hour, stirring occasionally, until thickened."],note:""},
  {id:"vegetarian-grain-bowl-meal-prep",icon:"🥗",label:"Bowl · 40 min",name:"Vegetarian Grain Bowl Meal Prep",meta:"40 min · Oven · Serves 4",ings:["1 sweet potato, peeled and chopped","½ lb brussels sprouts, halved","1 yellow bell pepper, chopped","½ red onion, chopped","15 oz can chickpeas, drained","Olive oil, salt, pepper, paprika","2 cups brown rice, cooked","2 carrots sliced, 1 head broccoli, 1 red bell pepper, ½ red cabbage, 1 cup snap peas","Garlic powder, onion powder","2 cups quinoa, cooked","Cilantro-lime dressing: Greek yogurt, lime, cilantro","Soy-maple dressing: soy sauce, maple syrup, ginger, garlic"],steps:["Preheat oven to 425°F. Line 2 baking sheets with parchment.","Sheet 1: toss chickpea bowl veg with oil, salt, pepper, paprika. Sheet 2: toss quinoa bowl veg with oil, salt, pepper, garlic powder, onion powder.","Roast both sheets 15–20 min until roasted to your liking.","Fill 2 storage bowls with 1 cup brown rice each; fill other 2 with 1 cup quinoa each.","Top rice bowls with chickpea veg; top quinoa bowls with other roasted veg. Store dressings separately. Keeps 4 days."],note:""},
  {id:"air-fryer-fish-tacos-with-cilantro-lime-slaw",icon:"🌮",label:"Tacos · 20 min",name:"Air Fryer Fish Tacos with Cilantro Lime Slaw",meta:"20 min · Air Fryer · Serves 4",ings:["1½ lb tilapia or white fish","1 tsp chili powder, ½ tsp oregano, ½ tsp garlic powder","½ tsp paprika, ¼ tsp cayenne, ¼ tsp onion powder","¼ tsp cumin, ½ tsp sea salt, ½ tsp cracked pepper","Tortillas for serving","Slaw: 2½ cups coleslaw mix","3 Tbsp mayo, 1 Tbsp lime juice","1 garlic clove minced, ⅓ cup cilantro","½ tsp sugar (optional), salt and pepper"],steps:["Spray air fryer basket with oil. Mix all spices.","Pat fish dry, lay in basket. Brush with olive oil, coat with spice rub, press gently. Spritz with oil.","Preheat air fryer to 400°F. Cook fish 8–10 min until opaque and flakes at 145°F. Do not flip.","While fish cooks, toss together all slaw ingredients. Adjust lime and salt to taste.","Cut fish into pieces. Serve in tortillas topped with slaw and extra lime."],note:"💡 No air fryer? Bake at 400°F for ~15 min instead."},
  {id:"creamy-tomato-gnocchi-with-burrata",icon:"🍝",label:"Pasta · 30 min",name:"Creamy Tomato Gnocchi with Burrata",meta:"30 min · Stovetop · Serves 6",ings:["¼ cup extra-virgin olive oil","6–8 garlic cloves, peeled and lightly crushed","2 pints cherry tomatoes","½ tsp red pepper flakes (optional)","1 tsp kosher salt, ½ tsp black pepper","½ cup heavy cream","2 (16 oz) packages potato gnocchi","2 (4 oz) balls fresh burrata","½ cup fresh basil leaves"],steps:["Bring large pot of salted water to boil. Heat olive oil in skillet over medium-low. Cook garlic until fragrant, ~2 min.","Increase to medium; add tomatoes. Cook until most break down and become jammy, 10–12 min. Season. Reduce and stir in cream.","Cook gnocchi per package. Reserve ½ cup pasta water, drain the rest.","Add gnocchi and pasta water to sauce. Toss until thick and glossy, ~2 min. Stir in basil.","Break burrata over pasta. Remove from heat. Garnish with reserved basil."],note:"💡 Add burrata after removing from heat — don't cook it or it loses its creamy texture."},
  {id:"white-chicken-chili",icon:"🫕",label:"Soup · 45 min",name:"White Chicken Chili",meta:"45 min · Stovetop · Serves 5",ings:["1 Tbsp olive oil","1 small yellow onion, chopped","2 garlic cloves, finely minced","2½ cups low-sodium chicken broth","2 (4 oz) cans diced green chilies","1½ tsp ground cumin, ¼ tsp cayenne","½ tsp dried oregano, ½ tsp paprika","½ small lime, juiced","2 (15 oz) cans great northern beans","1 cup sour cream or Greek yogurt","1 cup corn","2 heaping cups cooked shredded chicken","Cilantro, cheese, tortilla chips, avocado"],steps:["Sauté onion in oil over medium-high 3–5 min. Add garlic 30 sec.","Add broth, green chilies, all spices, lime juice, salt and pepper.","Drain and rinse beans. Puree a ladleful with broth for creaminess. Add all beans and corn. Simmer uncovered 15–30 min.","Remove from heat. Stir in sour cream and chicken. Serve with toppings."],note:"💡 For less spice: use 1 can green chilies, omit cayenne. Slow cooker: add raw chicken on low 5 hrs, shred, stir in sour cream at the end."},
  {id:"teriyaki-chicken-tacos-with-sesame-cucumber-slaw",icon:"🌮",label:"Tacos · 30 min",name:"Teriyaki Chicken Tacos with Sesame Cucumber Slaw",meta:"30 min · Instant Pot · Serves 4",ings:["2 lb boneless skinless chicken thighs","Salt and pepper","⅓ cup + ¼ cup teriyaki sauce","2 Tbsp sweet chili sauce","8 (6-inch) flour tortillas","1 avocado sliced, ¼ cup crushed peanuts, sesame seeds","Slaw: 1 large English cucumber, thinly sliced","¼ cup Greek yogurt, 1½ Tbsp mayo","2 Tbsp rice vinegar, 1 Tbsp sweet chili sauce","1 tsp sesame oil, fresh cilantro and green onions"],steps:["Season chicken with salt and pepper. Add to Instant Pot with ⅓ cup teriyaki sauce. Pressure cook 10 min.","Thinly slice cucumbers. Whisk dressing ingredients. Toss with cucumbers and herbs.","Release Instant Pot. Shred chicken. Spread on lined baking sheet, drizzle with remaining teriyaki and sweet chili sauce. Broil 3–6 min until caramelized.","Warm tortillas. Layer with chicken, cucumber slaw, avocado, crushed peanuts, sesame seeds."],note:"💡 Crockpot: high 2.5–3.5 hrs or low 4–5 hrs. Oven: 400°F for 35 min. Always broil at the end for caramelized edges."},
  {id:"sausage-white-bean-soup",icon:"🥣",label:"Soup · 30 min",name:"Sausage White Bean Soup",meta:"~30 min · Stovetop",ings:["1 lb Italian sausage, crumbled","1 Tbsp olive oil","1 medium onion, diced","3 cloves garlic, minced","2 carrots, peeled and sliced","2 stalks celery, chopped","1 (15 oz) can white beans, drained","4 cups chicken broth","1 tsp dried thyme, 1 tsp dried rosemary","Salt and pepper, fresh parsley"],steps:["Cook sausage in oil over medium until browned, breaking apart. Remove and set aside.","Add onion, garlic, carrots, and celery to same pot. Cook until softened, 5–7 min.","Return sausage. Add beans, broth, thyme, rosemary, salt and pepper. Simmer covered 20–25 min.","Serve garnished with fresh parsley."],note:"💡 Mash some of the white beans before adding for a creamier texture."},
  {id:"slow-cooker-chicken-pot-pie",icon:"🥧",label:"Slow Cooker · 3+ hrs",name:"Slow Cooker Chicken Pot Pie",meta:"3–8 hrs · Slow Cooker · Serves 6",ings:["1½ lbs boneless skinless chicken breasts","½ cup low-sodium chicken broth","1 tsp salt, ½ tsp black pepper","¼ tsp thyme, ¼ tsp rosemary, 1 tsp onion powder","2 (10.5 oz) cans cream of chicken soup","3 medium Yukon gold potatoes, diced","3 tsp garlic","1 (12 oz) bag frozen mixed vegetables","½ cup sour cream","1 (16 oz) can Pillsbury Grands biscuits (8 count)"],steps:["Place chicken in slow cooker, pour broth over. Season with salt, pepper, thyme, rosemary, onion powder. Pour cream of chicken soup over. Add potatoes, garlic, mixed vegetables.","Cook on low 6–8 hrs or high 3–4 hrs.","Remove chicken and shred with two forks. Return to slow cooker with sour cream. Mix until combined.","Bake biscuits per package. Serve filling with a biscuit on top."],note:"💡 Stir in sour cream at the end so it doesn't curdle."},
  {id:"creamy-parmesan-sausage-ditalini-soup",icon:"🍲",label:"Soup · 30 min",name:"Creamy Parmesan Sausage Ditalini Soup",meta:"~30 min · Stovetop",ings:["1 lb Italian sausage","1 Tbsp olive oil","1 small onion, diced","3 cloves garlic, minced","4 cups chicken broth","1 cup heavy cream","1 (14.5 oz) can diced tomatoes, drained","2 carrots, chopped","1 cup ditalini pasta","2 cups fresh spinach, chopped","½ cup grated Parmesan, plus extra","Salt, pepper, fresh parsley"],steps:["Cook sausage in oil over medium, breaking into pieces until browned. Remove and set aside.","Sauté onion and garlic in same pot 2–3 min.","Add broth, simmer. Stir in tomatoes and sausage.","Add ditalini; cook per package (8–10 min).","Stir in cream, Parmesan, and spinach. Simmer 2–3 min until spinach wilts. Season and garnish."],note:""},
  {id:"seared-salmon-with-lemon-orzo",icon:"🐟",label:"Seafood · 30 min",name:"Seared Salmon with Lemon Orzo",meta:"30 min · Stovetop · Serves 4",ings:["4 salmon fillets, ~6 oz each, skinless","2 Tbsp olive oil, salt, pepper, 1 tsp garlic powder","2 Tbsp butter","3 cloves garlic, minced","1 small shallot, finely chopped","¼ cup white wine","2½ cups chicken broth","1½ cups orzo pasta","½ cup heavy cream","½ cup grated Parmesan","1 Tbsp fresh lemon juice","2 cups fresh baby spinach","Lemon zest and fresh parsley for garnish"],steps:["Season salmon with salt, pepper, and garlic powder. Heat skillet over medium-high with oil. Sear salmon 2 min per side. Remove and set aside.","Melt butter in same skillet. Add garlic and shallots; cook 1–2 min. Add wine to deglaze, scraping up any bits.","Add broth; bring to simmer. Stir in orzo; cook 10 min, stirring occasionally, until tender and broth is absorbed.","Stir in cream, Parmesan, and lemon juice.","Return salmon to skillet. Add spinach; cook 2–3 min. Garnish with parsley and lemon zest."],note:""},
  {id:"falafel-bowl-with-tahini-dressing",icon:"🧆",label:"Bowl · 45 min",name:"Falafel Bowl with Tahini Dressing",meta:"~45 min · Oven or Air Fryer · Serves 4",ings:["1 cup dried chickpeas, soaked overnight","½ cup fresh cilantro, ½ cup fresh parsley","3 garlic cloves, 1 small onion","1 tsp cumin, 1 tsp coriander, ½ tsp cayenne (optional)","½ tsp baking powder, 3–4 Tbsp chickpea flour","2 cups cooked quinoa or brown rice","2 cups mixed greens","1 cup diced cucumber, 1 cup cherry tomatoes","½ red onion sliced, 1 shredded carrot, ½ cup hummus","1 avocado, pickled radishes","Tahini dressing: ¼ cup tahini, lemon juice, olive oil, water, garlic, maple syrup"],steps:["Drain soaked chickpeas. Pulse in food processor with cilantro, parsley, garlic, onion, spices, baking powder, and salt. Add chickpea flour until mixture holds together. Chill 30 min.","Shape into balls or patties. Fry 3–4 min per side, or bake 375°F for 25–30 min flipping halfway, or air fry 375°F for 15–18 min.","Cook grains per package. Season with olive oil and salt.","Whisk tahini dressing ingredients until pourable.","Assemble bowls: divide grains and greens, arrange toppings, add 3–4 falafels, spoon hummus, drizzle dressing. Garnish with cilantro."],note:""},
  {id:"one-pan-coconut-curry-salmon",icon:"🥥",label:"Seafood · 30 min",name:"One-Pan Coconut Curry Salmon",meta:"30 min · One Pan · Serves 4",ings:["4 salmon fillets, 1 tsp salt, ½ tsp pepper, ½ tsp paprika","1 Tbsp olive oil","2 Tbsp butter, 4 cloves garlic, 1 tsp grated ginger","1 tsp curry powder, ½ tsp turmeric","½ tsp red pepper flakes (optional)","1 (13.5 oz) can coconut milk","1 Tbsp tomato paste","1 tsp honey or maple syrup","1 Tbsp soy sauce, juice of ½ lime","Fresh cilantro or basil for garnish"],steps:["Pat salmon dry; season with salt, pepper, paprika. Sear in oil skin-side down 3–4 min until crispy. Flip, cook 2 more min. Remove.","Lower heat; melt butter. Sauté garlic and ginger 1 min. Stir in curry powder, turmeric, pepper flakes; toast 30 sec.","Add coconut milk, tomato paste, honey, soy sauce, and lime juice. Simmer 5 min.","Return salmon; spoon sauce over. Simmer 5 min until cooked through.","Garnish with cilantro. Serve over rice, quinoa, or with naan."],note:""},
  {id:"ground-turkey-teriyaki-stir-fry",icon:"🥦",label:"Stir Fry · 30 min",name:"Ground Turkey Teriyaki Stir Fry",meta:"30 min · Stovetop · Serves 4",ings:["1 lb ground turkey","2 tsp sesame oil","3 cups broccoli florets","1 small onion, small diced","1 cup shredded carrots","Salt and pepper","Sauce: ¼ cup soy sauce","3 Tbsp brown sugar, 1 cup water divided","2 Tbsp honey, 3 garlic cloves minced","1 tsp fresh ginger, 2 Tbsp cornstarch","1 Tbsp orange zest"],steps:["Sauce: Combine ¾ cup water, soy sauce, garlic, ginger, honey, and brown sugar in saucepan over medium. Bring to low boil. Whisk remaining water with cornstarch; stir in slowly until thickened. Add orange zest. Set aside.","Heat sesame oil in wok or skillet over medium-high. Sauté onion until softened. Add turkey; cook until fully cooked, 7–10 min.","Add broccoli and carrots; cook until tender.","Reduce heat to low; stir in teriyaki sauce. Simmer a few minutes. Serve over rice."],note:""},
  {id:"corn-chowder",icon:"🌽",label:"Soup · 45 min",name:"Corn Chowder",meta:"45 min · Stovetop · Serves 6",ings:["4 slices thick-cut bacon, diced","2 Tbsp butter","1 small sweet onion, finely diced","2 stalks celery, finely diced","3 cloves garlic, diced","1 tsp coarse salt, ½ tsp black pepper","¼ cup all-purpose flour","5 cups low-sodium chicken broth","2 medium russet potatoes, ½-inch cubes","3 cups corn kernels","1 Tbsp honey, ¼ tsp dried thyme, 2 bay leaves","1 cup heavy cream","1 cup shredded cheddar cheese","2 scallions, diced"],steps:["Cook bacon in heavy pot over medium until crispy. Remove, leaving ~3 Tbsp fat.","Add butter; cook onion and celery ~5 min. Add garlic 30 sec. Season with salt and pepper.","Sprinkle flour; cook 1–2 min. Pour in broth with potato, corn, honey, thyme, bay leaves. Bring to boil, simmer until potatoes tender, 10–12 min.","Discard bay leaves. Add cream. Blend to desired consistency with immersion blender.","Stir in cheese until melted. Add most of bacon. Garnish bowls with remaining bacon and scallions."],note:""},
  {id:"pesto-chicken-tortellini-and-veggies",icon:"🌿",label:"Pasta · 40 min",name:"Pesto Chicken Tortellini and Veggies",meta:"40 min · One Pan · Serves 4",ings:["2 Tbsp olive oil","1 lb boneless skinless chicken thighs, sliced into strips","Salt to taste","½ cup sun-dried tomatoes, drained and chopped, divided","1 lb asparagus, ends trimmed, cut in half","¼ cup basil pesto (or more)","1 cup cherry tomatoes, halved","1 cup refrigerated tortellini, uncooked"],steps:["Heat oil over medium. Cook seasoned chicken with ¼ cup sun-dried tomatoes 5–10 min until cooked through. Remove, leave oil in pan.","Add asparagus with remaining sun-dried tomatoes; cook 5–10 min until tender. Remove to serving plate.","Cook tortellini per package. Drain.","Return chicken to skillet with pesto. Stir to coat and warm, 1–2 min.","Add tortellini and cherry tomatoes. Stir to combine, add more pesto if desired. Plate alongside asparagus."],note:""},
  {id:"butter-cauliflower",icon:"🌸",label:"Veggie · 1 hr 5 min",name:"Butter Cauliflower",meta:"1 hr 5 min · Stovetop · Serves 4",ings:["2 Tbsp fresh lemon juice","2 tsp cornstarch","½ tsp cumin, 1 tsp turmeric (divided)","3 tsp garam masala (divided), 1½ tsp salt (divided)","2 Tbsp olive oil (divided)","1 medium head cauliflower, florets","3 Tbsp unsalted butter","1 yellow onion, finely chopped","3 garlic cloves, 2 tsp fresh ginger","2 Tbsp tomato paste, 1 tsp paprika, ¼ tsp cinnamon","1 (8 oz) can tomato sauce, 2 cups vegetable broth","½ cup heavy cream (or coconut milk)","Basmati rice, cilantro, Greek yogurt to serve"],steps:["Mix lemon juice, cornstarch, cumin, and half the turmeric, garam masala, and salt in a bowl. Set aside.","Heat 1 Tbsp oil; cook cauliflower tossing occasionally until browned, 7–8 min. Reduce heat; toss with cornstarch mixture. Cook 7–8 more min until charred in spots. Transfer to bowl.","Add remaining oil and butter. Cook onion until translucent, ~8 min. Add garlic, ginger, tomato paste; cook 2 min. Add remaining spices; cook 1 min. Add tomato sauce and broth; boil.","Stir in cream; return cauliflower. Simmer uncovered until sauce thickens, ~15 min. Garnish with cilantro; serve over rice with yogurt."],note:""},
  {id:"vegan-mushroom-bourguignon",icon:"🍄",label:"Veggie · 50 min",name:"Vegan Mushroom Bourguignon",meta:"50 min · Stovetop · Serves 3",ings:["1 oz dried mushrooms (or 10 oz fresh)","1 Tbsp oil, ½ large onion diced","2 small carrots, chopped","⅔ cup peas (optional)","3 garlic cloves, minced","¾ Tbsp fresh thyme (or 1 tsp dried)","1 tsp onion powder, smoked paprika, salt and pepper","⅓ cup red wine, ½ Tbsp tamari","¾ cup vegetable broth","¼ cup plant-based milk + ¾ Tbsp cornstarch","Mashed potatoes: 4 medium potatoes, coconut milk, nutmeg"],steps:["Soak dried mushrooms 15–20 min; drain. (Skip if using fresh.)","Cook potatoes in salted water ~15 min until tender. Drain; mash with coconut milk, nutmeg, salt and pepper.","Heat oil; sauté onion 4–5 min. Add mushrooms, carrots, peas, garlic, thyme, and spices. Sauté 1 min.","Add red wine; cook 2 min. Add tamari and broth; simmer covered 10–12 min until carrots soften.","Whisk plant milk and cornstarch; add to pan. Stir until sauce thickens. Simmer a few more minutes. Serve over mash."],note:""},
  {id:"louisiana-red-beans-and-rice",icon:"🫘",label:"Rice · 2–3 hrs",name:"Louisiana Red Beans and Rice",meta:"2–3 hrs · Stovetop · Serves 6",ings:["1 lb dried red kidney beans, soaked overnight","1 lb smoked sausage, sliced","1 medium onion, diced","1 green bell pepper, diced","2 celery stalks, diced","3 cloves garlic, minced","1 tsp thyme, 1 tsp smoked paprika","1 tsp cayenne, 1 tsp salt, ½ tsp black pepper","2 bay leaves","6 cups water or chicken broth","2 Tbsp olive oil, 1 tsp Worcestershire sauce","Cooked white rice, green onions, hot sauce"],steps:["Soak beans overnight; drain and rinse.","Brown sausage in oil ~5 min; remove. Cook onion, pepper, celery 5 min. Add garlic and spices; cook 30 sec.","Add beans, bay leaves, water or broth. Boil, then simmer uncovered 2–3 hrs, stirring occasionally. (Pressure cooker: 45 min high pressure.)","When beans are tender, mash some against the pot to thicken.","Return sausage; stir in Worcestershire. Simmer 10 more min. Remove bay leaves. Serve over rice with green onions and hot sauce."],note:""},
  {id:"spicy-garlic-chicken-bowl-with-hummus",icon:"🫕",label:"Bowl · 20 min",name:"Spicy Garlic Chicken Bowl with Hummus",meta:"~20 min · Stovetop · Serves 4",ings:["1 lb boneless skinless chicken thighs, cubed","2 Tbsp olive oil","4 cloves garlic, minced","1 tsp paprika, ½ tsp cayenne, 1 tsp cumin","Salt and black pepper","1 cup hummus","1 large cucumber, diced","½ red onion, thinly sliced","¼ cup fresh parsley, chopped","2 Tbsp lemon juice","Cooked rice or quinoa for serving"],steps:["Toss chicken with oil, garlic, paprika, cayenne, cumin, salt, and pepper.","Heat skillet over medium-high; cook chicken until browned and cooked through, 8–10 min.","Combine cucumber, red onion, parsley, and lemon juice for the salad.","Divide rice or quinoa among bowls. Top with chicken, a scoop of hummus, and the cucumber salad. Serve immediately."],note:""},
  {id:"lemon-chili-grilled-chicken-bowls-with-hummus",icon:"🍋",label:"Bowl · 35 min",name:"Lemon Chili Grilled Chicken Bowls with Hummus",meta:"35 min · Grill · Serves 2",ings:["2 chicken breasts, diced","1 Tbsp olive oil, 2 garlic cloves minced","1 Tbsp tomato paste, 1 Tbsp honey","1 tsp chili flakes, 1 Tbsp lemon juice","Salt, black pepper, fresh parsley","1 cup diced cucumber","½ cup cherry tomatoes or red bell pepper, chopped","1 tsp lemon juice, 1 Tbsp olive oil, salt","½ cup hummus, 1 tsp olive oil, ¼ tsp smoked paprika"],steps:["Marinate chicken in oil, garlic, tomato paste, honey, chili flakes, lemon juice, salt and pepper for 20–30 min.","Grill chicken (5–7 min per side whole, or 10–12 min diced in basket). Let rest, then dice.","Combine cucumber salad ingredients and toss.","Spread hummus into bowl bottoms; drizzle with oil and paprika. Add chicken over hummus. Top with cucumber salad and chopped parsley. Serve with warm pita."],note:""},
  {id:"creamy-parmesan-sausage-ditalini-soup-v2",icon:"🍲",label:"Soup · 40 min",name:"Creamy Parmesan Sausage Ditalini Soup (v2)",meta:"40 min · Stovetop · Serves 6",ings:["1 lb Italian sausage","1 small onion, chopped","2 cloves garlic, minced","1 (14.5 oz) can diced tomatoes","2 quarts chicken stock","½ cup heavy cream","1 cup ditalini pasta","½ cup Parmesan cheese","Dried basil and oregano"],steps:["Brown sausage in large pot over medium. Remove and set aside.","Sauté onion and garlic in same pot until fragrant.","Add tomatoes, stock, herbs, and return sausage; simmer 10 min.","Stir in ditalini; cook until al dente, 8–10 min.","Mix in cream and Parmesan; season. Serve hot with fresh parsley."],note:""},
  {id:"homemade-crunchwrap-supreme",icon:"🌯",label:"Tacos · 25 min",name:"Homemade Crunchwrap Supreme",meta:"25 min · Stovetop · Serves 6",ings:["1 lb ground meat","1 packet taco seasoning","6 burrito-size flour tortillas","6 tostada shells","1 cup sour cream","2 cups shredded lettuce","1 diced tomato","1 cup shredded Mexican cheese blend","Nacho cheese sauce"],steps:["Cook and crumble ground beef over medium-high until no longer pink. Drain. Add taco seasoning per packet.","Warm nacho cheese. Warm tortillas 20 sec in microwave.","Lay tortilla flat. Spread nacho cheese in center, add ½ cup taco meat, tostada shell, thin sour cream, lettuce, tomato, and shredded cheese.","Fold tortilla: start with bottom edge, fold up to center; work around, folding tight.","Cook seam-side down in oiled skillet over medium, 2–3 min until golden. Flip and cook other side. Serve immediately."],note:""},
  {id:"chicken-pineapple-fried-rice",icon:"🍍",label:"Rice · 30 min",name:"Chicken Pineapple Fried Rice",meta:"30 min · Stovetop · Serves 4",ings:["3 cups cooked jasmine rice, cold","½ lb skinless boneless chicken thighs","1 cup frozen mixed vegetables","1 cup diced pineapple","½ cup onion, finely diced","2 cloves garlic, minced","2 Tbsp vegetable oil","1½ Tbsp soy sauce, 1 tsp fish sauce","Salt and pepper","Marinade: 2 tsp soy sauce, 2 tsp sesame oil, 1 tsp cornstarch, ¼ tsp baking soda"],steps:["Break up cold day-old rice. Set aside.","Slice chicken on a bias; marinate with marinade ingredients 10–15 min.","Fry chicken in 1 Tbsp oil over medium-high until cooked through. Remove.","Sauté garlic and onions until fragrant. Add mixed vegetables and pineapple; cook 3–4 min, evaporating liquids. Push to side.","Add remaining oil and rice. Add soy sauce, fish sauce, salt and pepper. Toss everything. Add chicken back. Serve hot."],note:"💡 Day-old cold rice is key — fresh rice will turn mushy."},
  {id:"easy-shrimp-alfredo",icon:"🍤",label:"Pasta · 30 min",name:"Easy Shrimp Alfredo",meta:"30 min · Stovetop · Serves 4",ings:["1 lb uncooked shrimp, thawed and peeled","8 oz uncooked fettuccine","2 Tbsp butter","4 oz cream cheese, softened and cut into pieces","¾ cup heavy cream","¼ cup chicken broth","2 large cloves garlic, minced","1 cup freshly grated Parmesan","Salt and pepper"],steps:["Boil large salted pot of water; cook fettuccine al dente per package.","Add butter, cream cheese, cream, broth, and garlic to skillet over medium. Once hot, help cream cheese melt into sauce, ~2 min.","Let gently bubble 5 min until sauce reduces.","Stir in Parmesan; cook ~1 min.","Add shrimp; cook 5–6 min stirring occasionally. Season. Toss with drained pasta; serve immediately."],note:"💡 If sauce gets too thick, thin with a bit of hot pasta water."},
  {id:"creamy-spinach-and-mushroom-tortellini",icon:"🍄",label:"Pasta · 50 min",name:"Creamy Spinach and Mushroom Tortellini",meta:"50 min · Stovetop · Serves 4",ings:["2 Tbsp olive oil","2 large yellow onions, thinly sliced","1 Tbsp olive oil","8 oz crimini mushrooms, sliced","8 oz spinach","1 cup heavy cream","¼ tsp salt, ¼ tsp black pepper","9 oz refrigerated 3-cheese tortellini"],steps:["Caramelize onions: heat 2 Tbsp oil over medium-high; cook onions 10 min stirring constantly. Reduce to medium, cook 10 more min. Add pinch of salt, cook 10 min on medium-low. Total: 30 min. Remove to a plate.","Heat 1 Tbsp oil in same skillet over medium. Cook mushrooms with a pinch of salt 5 min until soft.","Add spinach; stir on low until wilted. Add back caramelized onions. Pour in cream and salt; bring to quick boil. Reduce, simmer 2 min.","Cook tortellini per package; drain. Add to sauce; stir on low a few minutes. Serve with cracked black pepper."],note:"💡 Caramelized onions can be made 1–2 days ahead and refrigerated."},
  {id:"garlic-sesame-noodles",icon:"🍜",label:"Pasta · 15 min",name:"Garlic Sesame Noodles",meta:"15 min · Stovetop · Serves 4",ings:["12 oz brown rice noodles","1 Tbsp oil (avocado, olive, or coconut)","6 cloves garlic, finely minced","¼–⅓ cup low sodium soy sauce or tamari","2 Tbsp veggie broth","1½ Tbsp rice vinegar","2 Tbsp toasted sesame oil","1 Tbsp honey or maple syrup","2 Tbsp tahini, 2 tsp sriracha","½ tsp ground ginger","Scallions, red pepper flakes, crushed peanuts"],steps:["Whisk together all sauce ingredients until smooth with no ginger lumps.","Mince garlic very finely. Sauté in neutral oil until edges look golden brown.","Pour sauce into pan with garlic; mix well. Simmer 2–3 min until sauce thickens slightly.","Boil a large pot of water; cook noodles per package.","Combine noodles with sauce. Garnish with scallions, red pepper flakes, and crushed peanuts."],note:"💡 Use low-sodium soy sauce — regular will be too salty. Double the sauce if adding veggies, chicken, or tofu."},
  {id:"shakshuka",icon:"🍳",label:"Dinner · 30 min",name:"Shakshuka",meta:"30 min · Stovetop · Serves 6",ings:["2 Tbsp olive oil","1 medium onion, diced","1 red bell pepper, seeded and diced","4 garlic cloves, finely chopped","2 tsp paprika, 1 tsp cumin, ¼ tsp chili powder","1 (28 oz) can whole peeled tomatoes","6 large eggs","Salt and pepper","Fresh cilantro and parsley, chopped"],steps:["Heat oil in large sauté pan over medium. Cook bell pepper and onion 5 min until onion is translucent.","Add garlic and spices; cook 1 more min.","Pour in tomatoes with juice, breaking down with a spoon. Season; bring to simmer.","Make small wells; crack eggs into each. Cover and cook 5–8 min until eggs are done to your liking.","Garnish with cilantro and parsley. Serve with pita."],note:"💡 Crumbled feta or goat cheese on top is a delicious addition. Use stainless steel — tomatoes can damage cast iron seasoning."},
  {id:"miso-glazed-salmon-bowls",icon:"🐟",label:"Seafood · 30 min",name:"Miso Glazed Salmon Bowls",meta:"~30 min · Sheet pan + rice · Serves 4",ings:["4 salmon fillets (~6 oz each), skinless","3 tbsp white miso paste","2 tbsp low-sodium soy sauce","2 tbsp honey or maple syrup","1 tbsp rice vinegar","1 tsp toasted sesame oil","1 tsp fresh ginger, grated","2 cloves garlic, minced","1½ cups jasmine rice","1 large English cucumber, thinly sliced","1 cup shredded carrots","1 cup shelled edamame (thawed)","2–3 green onions, sliced","1 tbsp sesame seeds"],steps:["Cook jasmine rice per package instructions.","Whisk together miso paste, soy sauce, honey, rice vinegar, sesame oil, ginger, and garlic to make the glaze.","Pat salmon dry. Place on a foil-lined baking sheet. Spoon half the glaze over each fillet.","Broil at 400°F for 12–15 minutes, basting with remaining glaze halfway through, until salmon flakes easily.","Assemble bowls: rice base topped with salmon, cucumber, carrots, and edamame. Drizzle with any remaining glaze.","Garnish with sliced green onions and sesame seeds."],note:"Leftovers keep well — store components separately and assemble fresh."}
];

// All IDs in the core RECIPES array above
var CORE_IDS = {};
RECIPES.forEach(function(r) { CORE_IDS[r.id] = true; });

var list = document.getElementById('list');

window.addEventListener('load', function() {
  RecipeCard.init({
    coreIds: CORE_IDS,
    onSaveChange: function(id, saved, recipeObj) {
      // If a journal recipe was just saved, add it to the list; if unsaved, remove it
      var existing = list.querySelector('.rc-card[data-saved-id="' + id + '"]');
      if (saved && !existing) {
        // Find or create the "From Your Journal" divider
        var divider = list.querySelector('.section-divider');
        if (!divider) {
          divider = document.createElement('div');
          divider.className = 'section-divider';
          divider.innerHTML = '<div class="section-divider-line"></div><span class="section-divider-label">From Your Journal</span><div class="section-divider-line"></div>';
          list.appendChild(divider);
        }
        var card = RecipeCard.makeCard(recipeObj, 'Saved from journal');
        card.setAttribute('data-saved-id', id);
        list.appendChild(card);
        updateCount();
      } else if (!saved && existing) {
        existing.remove();
        // Remove divider if no more saved cards
        if (!list.querySelector('.rc-card[data-saved-id]')) {
          var div = list.querySelector('.section-divider');
          if (div) div.remove();
        }
        updateCount();
      }
    },
    onReady: function() {
      RecipeCard.applyBadges();
      // Load saved journal recipes
      RecipeCard.loadSavedRecipes(function(saved) {
        if (saved.length > 0) {
          var divider = document.createElement('div');
          divider.className = 'section-divider';
          divider.innerHTML = '<div class="section-divider-line"></div><span class="section-divider-label">From Your Journal</span><div class="section-divider-line"></div>';
          list.appendChild(divider);
          saved.forEach(function(r) {
            var displayR = Object.assign({}, r);
            if (!displayR.label || /Meal [A-Z]/.test(displayR.label)) displayR.label = 'Saved from journal';
            var card = RecipeCard.makeCard(displayR, displayR.label);
            var id = r.id || r.name.toLowerCase().replace(/[^a-z0-9]+/g, '-');
            card.setAttribute('data-saved-id', id);
            list.appendChild(card);
          });
          updateCount(saved.length);
        }
        RecipeCard.applyBadges();
      });
    }
  });

  // Render core recipes
  RECIPES.forEach(function(r) { list.appendChild(RecipeCard.makeCard(r)); });
  updateCount(0);
});

function updateCount(savedCount) {
  var sc = savedCount !== undefined ? savedCount : list.querySelectorAll('.rc-card[data-saved-id]').length;
  document.getElementById('hm').textContent = (RECIPES.length + sc) + ' recipes · tap any recipe to view & cook';
}
</script>
