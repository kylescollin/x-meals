<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<meta name="apple-mobile-web-app-title" content="Fox & Bear Kitchen">
<title>Recipe Collection — Fox &amp; Bear Kitchen</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="theme.css">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'DM Sans',sans-serif;background:var(--cream);color:var(--ink);min-height:100vh;-webkit-font-smoothing:antialiased;}
  .hd{max-width:680px;margin:0 auto 28px;border-bottom:1px solid var(--border);padding:28px 20px 24px;}
  .ey{font-weight:500;font-size:11px;letter-spacing:2.5px;text-transform:uppercase;color:var(--accent);margin-bottom:10px;}
  h1{font-family:'Playfair Display',serif;font-size:36px;font-weight:700;line-height:1.1;margin-bottom:8px;}
  .hm{font-size:13px;color:var(--muted);font-weight:300;}
  .add-recipe-btn{display:inline-flex;align-items:center;gap:6px;margin-top:16px;background:var(--accent);color:#fff;border:none;border-radius:100px;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;padding:9px 16px;cursor:pointer;-webkit-tap-highlight-color:transparent;transition:transform .12s,background .15s;}
  .add-recipe-btn:active{transform:scale(.95);background:#b3581f;}
  .add-recipe-btn .plus{font-size:16px;line-height:1;margin-top:-1px;}
  .rl{max-width:680px;margin:0 auto 60px;padding:0 20px;display:flex;flex-direction:column;gap:10px;}
  .section-divider{display:flex;align-items:center;gap:14px;}
  .section-divider-line{flex:1;height:1px;background:var(--border);}
  .section-divider-label{font-size:10px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:var(--muted);white-space:nowrap;}
  .srch-wrap{max-width:680px;margin:0 auto;padding:0 20px 18px;position:relative;}
  #srch{width:100%;padding:12px 40px 12px 16px;border:1.5px solid var(--border);border-radius:10px;background:#fff;font-family:'DM Sans',sans-serif;font-size:15px;color:var(--ink);outline:none;-webkit-appearance:none;}
  #srch:focus{border-color:var(--accent);}
  #srch::placeholder{color:var(--muted);}
  .srch-x{display:none;position:absolute;right:32px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--muted);font-size:18px;cursor:pointer;padding:4px 6px;line-height:1;}
  .srch-empty{display:none;max-width:680px;margin:-8px auto 20px;padding:0 20px;font-size:13px;color:var(--muted);font-weight:300;}
</style>
</head>
<body>
<script src="nav.js"></script>
<div class="hd">
  <div class="ey">Fox &amp; Bear Kitchen</div>
  <h1>Recipe Collection</h1>
  <div class="hm" id="hm"></div>
  <button class="add-recipe-btn" id="add-recipe"><span class="plus">+</span>Add recipe</button>
</div>
<div class="srch-wrap">
  <input type="search" id="srch" placeholder="Search recipes or ingredients…" autocomplete="off" autocorrect="off" spellcheck="false">
  <button class="srch-x" id="srch-x" aria-label="Clear">✕</button>
</div>
<div class="srch-empty" id="srch-empty">No recipes match "<span id="srch-q"></span>"</div>
<div class="rl" id="list"></div>

<script src="recipe-card.js"></script>
<script type="module">
import { requireAuth, getAuthToken, signOut } from './auth.js';
window.getToken  = getAuthToken;
window.doSignOut = signOut;
var user = await requireAuth();
if (window.setNavUser) window.setNavUser(user);

var list = document.getElementById('list');

// Load core recipes from data/recipes.json (permanent storage)
var recipesData = await fetch('data/recipes.json').then(function(r) { return r.json(); });
var RECIPES = recipesData.recipes || [];
var CORE_IDS = {};
RECIPES.forEach(function(r) { CORE_IDS[r.id] = true; });

// Search index: recipe id → searchable string
var searchIndex = {};
function indexRecipe(r) {
  var id = RecipeCard.idOf(r);
  searchIndex[id] = [r.name, r.label, r.meta, (r.ingredients || []).join(' ')].join(' ').toLowerCase();
}

RecipeCard.init({
    coreIds: CORE_IDS,
    userEmail: user.email,
    onSaveChange: function(id, saved, recipeObj) {
      // If a journal recipe was just saved, add it to the list; if unsaved, remove it
      var existing = list.querySelector('.rc-card[data-saved-id="' + id + '"]');
      if (saved && !CORE_IDS[id] && !existing) {
        var divider = list.querySelector('.section-divider');
        if (!divider) {
          divider = document.createElement('div');
          divider.className = 'section-divider';
          divider.innerHTML = '<div class="section-divider-line"></div><span class="section-divider-label">Your Recipes</span><div class="section-divider-line"></div>';
          list.appendChild(divider);
        }
        indexRecipe(recipeObj);
        var lbl = (recipeObj.label && !/Meal [A-Z]/.test(recipeObj.label)) ? recipeObj.label : '';
        var card = RecipeCard.makeCard(recipeObj, lbl);
        card.setAttribute('data-saved-id', id);
        list.appendChild(card);
        runFilter();
        updateCount();
        card.scrollIntoView({ behavior: 'smooth', block: 'center' });
      } else if (!saved && existing) {
        existing.remove();
        if (!list.querySelector('.rc-card[data-saved-id]')) {
          var div = list.querySelector('.section-divider');
          if (div) div.remove();
        }
        runFilter();
        updateCount();
      }
    },
    onReady: function() {
      RecipeCard.applyBadges();
      // Load recently saved recipes not yet promoted to core (data/recipes.json)
      RecipeCard.loadSavedRecipes(function(saved) {
        var newlySaved = saved.filter(function(r) {
          return !CORE_IDS[RecipeCard.idOf(r)];
        });
        if (newlySaved.length > 0) {
          var divider = document.createElement('div');
          divider.className = 'section-divider';
          divider.innerHTML = '<div class="section-divider-line"></div><span class="section-divider-label">Your Recipes</span><div class="section-divider-line"></div>';
          list.appendChild(divider);
          newlySaved.forEach(function(r) {
            var displayR = Object.assign({}, r);
            if (!displayR.label || /Meal [A-Z]/.test(displayR.label)) displayR.label = '';
            indexRecipe(r);
            var card = RecipeCard.makeCard(displayR, displayR.label);
            var id = RecipeCard.idOf(r);
            card.setAttribute('data-saved-id', id);
            list.appendChild(card);
          });
          updateCount(newlySaved.length);
        }
        RecipeCard.applyBadges();
        runFilter();
      });
    }
  });

// Render core recipes
RECIPES.forEach(function(r) { indexRecipe(r); list.appendChild(RecipeCard.makeCard(r)); });
updateCount(0);

// Add recipe button → open the blank add form
document.getElementById('add-recipe').addEventListener('click', function() {
  RecipeCard.openAddForm();
});

function updateCount(savedCount) {
  var q = document.getElementById('srch').value.trim().toLowerCase();
  if (q) return; // subtitle is managed by runFilter when search is active
  var sc = savedCount !== undefined ? savedCount : list.querySelectorAll('.rc-card[data-saved-id]').length;
  document.getElementById('hm').textContent = (RECIPES.length + sc) + ' recipes · tap any recipe to view & cook';
}

// Search
var srchInput = document.getElementById('srch');
var srchX     = document.getElementById('srch-x');
var srchEmpty = document.getElementById('srch-empty');

srchInput.addEventListener('input', runFilter);
srchX.addEventListener('click', function() {
  srchInput.value = '';
  runFilter();
  srchInput.focus();
});

function runFilter() {
  var q = srchInput.value.trim().toLowerCase();
  srchX.style.display = q ? 'block' : 'none';

  var cards = list.querySelectorAll('.rc-card');
  var visible = 0;
  cards.forEach(function(card) {
    var id = card.getAttribute('data-recipe-id');
    var match = !q || (searchIndex[id] || '').includes(q);
    card.style.display = match ? '' : 'none';
    if (match) visible++;
  });

  // Hide the "From Your Journal" divider if all journal cards are filtered
  var divider = list.querySelector('.section-divider');
  if (divider) {
    var anyJournal = Array.from(list.querySelectorAll('.rc-card[data-saved-id]'))
      .some(function(c) { return c.style.display !== 'none'; });
    divider.style.display = anyJournal ? '' : 'none';
  }

  // Empty state
  document.getElementById('srch-q').textContent = srchInput.value.trim();
  srchEmpty.style.display = (visible === 0 && q) ? 'block' : 'none';

  // Update subtitle
  var total = RECIPES.length + list.querySelectorAll('.rc-card[data-saved-id]').length;
  document.getElementById('hm').textContent = q
    ? visible + ' of ' + total + ' recipes match'
    : total + ' recipes · tap any recipe to view & cook';
}
</script>
</body>
</html>
