<div class="hd"><div class="ey">Fox &amp; Bear Kitchen</div><h1>Recipe Collection</h1><div class="hm" id="hm"></div></div>

<script>
fetch('data/recipes.json')
  .then(function(r) { return r.json(); })
  .then(function(data) {
    var RECIPES = data.recipes;
    document.getElementById('hm').textContent=RECIPES.length+' recipes \u00b7 tap any recipe to view & cook';
    var list=document.getElementById('list');
    RECIPES.forEach(function(r){var d=document.createElement('div');d.className='mc';d.innerHTML='<div class="mh"><div class="mi">'+r.icon+'</div><div class="mn"><div class="ml">'+r.label+'</div><div class="mn2">'+r.name+'</div><div class="mm">'+r.meta+'</div></div><div class="ch">&#8250;</div></div>';d.addEventListener('click',function(){openDetail(r);});list.appendChild(d);});
    var curR=null;var rdEl=document.getElementById('rd'),rdName=document.getElementById('rn'),rdNote=document.getElementById('rno'),rdIngs=document.getElementById('ril'),rdSteps=document.getElementById('rsl');
    function openDetail(r){curR=r;rdName.textContent=r.name;rdIngs.innerHTML=r.ings.map(function(i){return'<li>'+i+'</li>';}).join('');rdSteps.innerHTML=r.steps.map(function(s,n){return'<li><span class="rsn">'+(n+1)+'</span><span>'+s+'</span></li>';}).join('');if(r.note){rdNote.textContent=r.note;rdNote.style.display='';}else{rdNote.style.display='none';}document.querySelector('.rbd').scrollTop=0;rdEl.classList.add('open');rdEl.setAttribute('aria-hidden','false');document.body.style.overflow='hidden';}
    function closeDetail(){rdEl.classList.remove('open');rdEl.setAttribute('aria-hidden','true');if(!document.getElementById('ck').classList.contains('open'))document.body.style.overflow='';}
    document.getElementById('rbk').addEventListener('click',closeDetail);
    document.addEventListener('keydown',function(e){if(e.key==='Escape'){var ck=document.getElementById('ck');if(ck.classList.contains('open'))window.closeMode&&window.closeMode();else if(rdEl.classList.contains('open'))closeDetail();}});
    (function(){var ck=document.getElementById('ck'),track=document.getElementById('ctr'),ingScroll=document.getElementById('cis'),ingHead=document.getElementById('cih'),ingsList=document.getElementById('cil'),stepVp=document.getElementById('sv'),dotsEl=document.getElementById('cdo'),prevBtn=document.getElementById('prev'),nextBtn=document.getElementById('next'),closeX=document.getElementById('cx'),titleEl=document.getElementById('ct'),pip0=document.getElementById('cp0'),pip1=document.getElementById('cp1'),hintIng=document.getElementById('shi'),hintSteps=document.getElementById('shs');var recipe=null,stepIdx=0,isSteps=false,slides=[],dots=[],wakeLock=null,ingHid=false,stpHid=false;function lockOn(){if('wakeLock'in navigator){navigator.wakeLock.request('screen').then(function(l){wakeLock=l;}).catch(function(){});}}function lockOff(){if(wakeLock){wakeLock.release().catch(function(){});wakeLock=null;}}document.addEventListener('visibilitychange',function(){if(ck.classList.contains('open')&&document.visibilityState==='visible')lockOn();});function parseIng(s){var m=s.match(/^((?:[\d\u00bd\u2153\u2154\u00bc\u00be\s\/]+)\s*(?:cup|cups|tbsp|tsp|lb|lbs|oz|g|kg|ml|l|clove|cloves|medium|large|small|head|can|bunch|pinch|dash)?s?\.?)\s+([\s\S]+)/i);return m?{qty:m[1].trim(),name:m[2].trim()}:{qty:'\u2014',name:s};}function buildIngs(r){ingHead.textContent=r.name;titleEl.textContent=r.name;ingsList.innerHTML=r.ings.map(function(i){var p=parseIng(i);return'<li class="cir"><span class="cq">'+p.qty+'</span><span class="cn">'+p.name+'</span></li>';}).join('');ingScroll.scrollTop=0;}function buildSteps(r){slides.forEach(function(s){s.remove();});slides=[];dots=[];dotsEl.innerHTML='';stepVp.removeChild(hintSteps);r.steps.forEach(function(text,i){var sl=document.createElement('div');sl.className='sl'+(i===0?' active':'');sl.innerHTML='<div class="sb">'+String(i+1).padStart(2,'0')+'</div><div class="so">of '+r.steps.length+'</div><div class="st">'+text+'</div>';stepVp.appendChild(sl);slides.push(sl);var d=document.createElement('div');d.className='cd'+(i===0?' on':'');dotsEl.appendChild(d);dots.push(d);});stepVp.appendChild(hintSteps);stepIdx=0;refreshNav();}function goStep(n){if(n<0||n>=recipe.steps.length||n===stepIdx)return;var fwd=n>stepIdx,from=slides[stepIdx],to=slides[n];from.classList.remove('active');from.classList.add(fwd?'eu':'ed');to.style.transition='none';to.style.opacity='0';to.style.transform=fwd?'translateY(48px)':'translateY(-48px)';requestAnimationFrame(function(){requestAnimationFrame(function(){to.style.transition='';to.style.opacity='';to.style.transform='';to.classList.add('active');});});setTimeout(function(){from.classList.remove('eu','ed');},320);dots[stepIdx].classList.remove('on');dots[stepIdx].classList.toggle('done',fwd);dots[n].classList.remove('done');dots[n].classList.add('on');stepIdx=n;refreshNav();hideStepHint();}function refreshNav(){prevBtn.disabled=stepIdx===0;nextBtn.disabled=!recipe||stepIdx===recipe.steps.length-1;}function showPanel(p){isSteps=p==='steps';track.classList.toggle('fl',isSteps);pip0.classList.toggle('on',!isSteps);pip1.classList.toggle('on',isSteps);if(isSteps)hideIngHint();}function hideIngHint(){if(!ingHid){ingHid=true;hintIng.classList.add('gone');}}function hideStepHint(){if(!stpHid){stpHid=true;hintSteps.classList.add('gone');}}var t0=null;ck.addEventListener('touchstart',function(e){var t=e.touches[0];t0={x:t.clientX,y:t.clientY,ms:Date.now()};},{passive:true});ck.addEventListener('touchend',function(e){if(!t0)return;var t=e.changedTouches[0],dx=t.clientX-t0.x,dy=t.clientY-t0.y,ms=Date.now()-t0.ms;t0=null;var D=44;if(Math.max(Math.abs(dx),Math.abs(dy))<D||ms>700)return;if(Math.abs(dx)>Math.abs(dy)){if(dx<-D&&!isSteps)showPanel('steps');if(dx>D&&isSteps)showPanel('ingredients');}else{if(isSteps){if(dy<-D)goStep(stepIdx+1);if(dy>D)goStep(stepIdx-1);}}},{passive:true});document.addEventListener('keydown',function(e){if(!ck.classList.contains('open'))return;if(isSteps){if(e.key==='ArrowDown'||e.key==='ArrowRight')goStep(stepIdx+1);if(e.key==='ArrowUp'||e.key==='ArrowLeft')goStep(stepIdx-1);}else{if(e.key==='ArrowRight')showPanel('steps');}});window.openMode=function(r){recipe=r;buildIngs(r);buildSteps(r);showPanel('ingredients');ingHid=stpHid=false;hintIng.classList.remove('gone');hintSteps.classList.remove('gone');ck.classList.add('open');ck.setAttribute('aria-hidden','false');document.body.style.overflow='hidden';lockOn();};window.closeMode=function(){ck.classList.remove('open');ck.setAttribute('aria-hidden','true');lockOff();if(!rdEl.classList.contains('open'))document.body.style.overflow='';};closeX.addEventListener('click',window.closeMode);prevBtn.addEventListener('click',function(){goStep(stepIdx-1);});nextBtn.addEventListener('click',function(){goStep(stepIdx+1);});document.getElementById('rck').addEventListener('click',function(){if(curR)window.openMode(curR);});})();
  });
